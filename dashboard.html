<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core | Dashboard</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:#f4f6f9;
  color:#1f2937;
}

.header{
  background:#111827;
  color:#fff;
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.header h2{
  margin:0;
  font-size:16px;
  letter-spacing:1px;
}

.container{
  padding:30px;
}

.card{
  background:#ffffff;
  padding:25px;
  border-radius:8px;
  box-shadow:0 4px 18px rgba(0,0,0,0.06);
  max-width:600px;
}

.card h3{
  margin-top:0;
  font-size:18px;
}

.status{
  margin-top:10px;
  font-size:14px;
  color:#16a34a;
  font-weight:500;
}

button{
  background:#111827;
  color:#ffffff;
  border:none;
  padding:8px 16px;
  border-radius:5px;
  cursor:pointer;
  font-size:13px;
}

button:hover{
  opacity:0.9;
}

.footer{
  margin-top:40px;
  font-size:12px;
  color:#6b7280;
}
</style>
</head>

<body>

<div class="header">
  <h2>NEXUS CORE SYSTEM</h2>
  <button onclick="logout()">Sign Out</button>
</div>

<div class="container">

  <div class="card">
    <h3>Internal Dashboard</h3>
    <div class="status">● Secure Session Active</div>

    <p style="margin-top:15px;font-size:14px;">
      Access Level: Authorized Personnel<br>
      Environment: Secure Internal Network
    </p>

    <div class="footer">
      © 2025 Nexus Core System · Internal Use Only
    </div>
  </div>

</div>

<script>
if(!localStorage.getItem("session")){
  window.location.href="index.html";
}

function logout(){
  localStorage.removeItem("session");
  window.location.href="index.html";
}
</script>

</body>
</html>
