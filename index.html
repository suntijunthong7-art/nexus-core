<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#0c4a52,#06383d);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
background:white;
width:340px;
padding:40px 30px;
border-radius:14px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.logo{
width:90px;
margin-bottom:10px;
}

h1{
font-size:22px;
margin:5px 0;
}

.sub{
color:#666;
font-size:14px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:13px;
border:none;
border-radius:8px;
background:#26374d;
color:white;
font-size:15px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1e2d40;
}

.msg{
margin-top:15px;
font-size:14px;
}

.error{
color:#d30000;
}

.lock{
color:#c0392b;
}

.footer{
margin-top:15px;
font-size:11px;
color:#777;
}

</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h1>NEXUS CORE SYSTEM</h1>
<div class="sub">Secure Access Portal</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">SIGN IN</button>

<div id="msg" class="msg"></div>

<div class="footer">
Authorized personnel only. All access is logged and monitored.<br>
© 2025 Nexus Core Systems<br>
Internal Access Gateway v2.4.1
</div>

</div>

<script>

const ADMIN_USER="admin"
const ADMIN_PASS="1234"

let fail=0
let locked=false

if(localStorage.getItem("session")=="active"){
location.href="https://lin.ee/lGGma6p"
}

function login(){

if(locked)return

let u=document.getElementById("user").value
let p=document.getElementById("pass").value
let msg=document.getElementById("msg")

if(u===ADMIN_USER && p===ADMIN_PASS){

localStorage.setItem("session","active")

msg.innerHTML="Access granted..."
msg.style.color="green"

setTimeout(()=>{
location.href="https://lin.ee/lGGma6p"
},1200)

}

else{

fail++

msg.innerHTML="Invalid access credentials"
msg.className="msg error"

if(fail>=3){
lock()
}

}

}

function lock(){

locked=true

let time=30
let msg=document.getElementById("msg")

msg.className="msg lock"

let timer=setInterval(()=>{

msg.innerHTML="Security Lock Active — Retry in "+time+"s"

time--

if(time<0){
clearInterval(timer)
locked=false
fail=0
msg.innerHTML=""
}

},1000)

}

document.addEventListener("keypress",function(e){

if(e.key==="Enter"){
login()
}

})

</script>

</body>
</html>
