<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#083a42,#0e5c63);
}

.card{
background:#fff;
width:340px;
padding:35px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
text-align:center;
}

.logo{
width:80px;
margin-bottom:14px;
}

h1{
font-size:20px;
margin:5px 0;
letter-spacing:1px;
}

.subtitle{
color:#777;
font-size:14px;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:14px;
border-radius:6px;
border:1px solid #ddd;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#2e3f55;
color:white;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:#9aa1a9;
cursor:not-allowed;
}

.lock{
margin-top:12px;
color:#c43c3c;
font-size:14px;
}

.footer{
margin-top:16px;
font-size:11px;
color:#777;
}

</style>
</head>

<body>

<div class="card">

<img src="https://i.imgur.com/5b6XGQp.png" class="logo">

<h1>NEXUS CORE SYSTEM</h1>
<div class="subtitle">Secure Access Portal</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div id="lockMsg" class="lock"></div>

<div class="footer">
Authorized personnel only. All access is logged and monitored.<br>
© 2025 Nexus Core Systems<br>
Internal Access Gateway v2.4.1
</div>

</div>

<script>

let locked=false

function login(){

if(locked)return

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u==="admin" && p==="1234"){

alert("Access Granted")

}else{

startLock()

}

}

function startLock(){

locked=true
let btn=document.getElementById("loginBtn")
let msg=document.getElementById("lockMsg")

let time=30

btn.disabled=true

msg.innerText="Security Lock Active — Retry in "+time+"s"

let timer=setInterval(()=>{

time--

msg.innerText="Security Lock Active — Retry in "+time+"s"

if(time<=0){

clearInterval(timer)

btn.disabled=false
msg.innerText=""
locked=false

}

},1000)

}

</script>

</body>
</html>
