<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Access</title>

<style>
body{
    margin:0;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    color:#00ffcc;
}

.container{
    background:#111;
    padding:40px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 25px #00ffcc;
    width:300px;
}

.logo{
    width:120px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    text-align:center;
    font-size:18px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#00ffcc;
    font-weight:bold;
    cursor:pointer;
}
button:hover{
    background:#00ccaa;
}
</style>
</head>

<body>

<div class="container">
    <img src="logo.png" class="logo">
    <h2>SECURE LOGIN</h2>
    <input type="password" id="password" placeholder="Enter Access Code">
    <button onclick="login()">ENTER</button>
</div>

<audio id="alarmSound" src="alarm.mp3" preload="auto"></audio>

<script>
let attempts = 0;

function login(){
    const pass = document.getElementById("password").value;
    const alarm = document.getElementById("alarmSound");

    if(pass === "1234"){
        window.location.href = "https://lin.ee/xbIaU45";
    }else{
        attempts++;

        alarm.currentTime = 0;
        alarm.play().catch(()=>{});

        if(attempts >= 3){
            alert("⚠ SECURITY ALERT ⚠\nUnauthorized Access Attempt Detected");
        }
    }
}
</script>

</body>
</html>
