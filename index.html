<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core | Secure Access</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#ffffff;
  width:100%;
  max-width:360px;
  padding:40px 30px;
  border-radius:8px;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
  text-align:center;
}

.logo{
  width:90px;
  margin-bottom:10px;
}

.company{
  font-size:13px;
  letter-spacing:2px;
  color:#6b7280;
  margin-bottom:5px;
}

h1{
  font-size:18px;
  margin:0 0 25px 0;
  color:#1f2937;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #d1d5db;
  border-radius:6px;
  font-size:14px;
  background:#ffffff;
}

input:focus{
  outline:none;
  border:1px solid #2563eb;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#1f2937;
  color:#ffffff;
  font-weight:600;
  cursor:pointer;
}

button:disabled{
  background:#9ca3af;
  cursor:not-allowed;
}

.message{
  font-size:13px;
  margin-bottom:10px;
  color:#dc2626;
}

.timer{
  font-size:13px;
  color:#b91c1c;
  margin-bottom:10px;
}

.footer{
  margin-top:25px;
  font-size:11px;
  color:#6b7280;
}
</style>
</head>

<body>

<div class="container">

  <!-- ใส่ไฟล์โลโก้ในโฟลเดอร์เดียวกัน -->
  <img src="logo.png" class="logo" alt="Nexus Core Logo">

  <div class="company">NEXUS CORE SYSTEM</div>
  <h1>Secure Access Portal</h1>

  <div class="message" id="message"></div>
  <div class="timer" id="timer"></div>

  <input type="text" id="user" placeholder="User ID">
  <input type="password" id="pass" placeholder="Password">

  <button id="loginBtn">SIGN IN</button>

  <div class="footer">
    © 2025 Nexus Core. All rights reserved.
  </div>

</div>

<script>
const correctUser = "LC-A01";
const correctPass = "Lc1993♧";

const loginBtn = document.getElementById("loginBtn");
const message = document.getElementById("message");
const timerEl = document.getElementById("timer");

let attempts = parseInt(localStorage.getItem("attempts")) || 0;
let lockUntil = parseInt(localStorage.getItem("lockUntil")) || 0;

function checkLock(){
  const now = Date.now();

  if(now < lockUntil){
    loginBtn.disabled = true;
    const remaining = Math.ceil((lockUntil - now)/1000);
    timerEl.innerText = "Account locked. Try again in " + remaining + " seconds.";

    setTimeout(checkLock,1000);
  }else{
    loginBtn.disabled = false;
    timerEl.innerText = "";
    localStorage.removeItem("lockUntil");
  }
}

function getLockTime(attempts){
  if(attempts >= 9) return 180;
  if(attempts >= 6) return 90;
  if(attempts >= 3) return 30;
  return 0;
}

loginBtn.addEventListener("click", function(){

  if(Date.now() < lockUntil) return;

  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if(user === correctUser && pass === correctPass){
    message.style.color = "green";
    message.innerText = "Login successful.";
    localStorage.removeItem("attempts");
    localStorage.removeItem("lockUntil");
    return;
  }

  attempts++;
  localStorage.setItem("attempts", attempts);

  message.style.color = "#dc2626";
  message.innerText = "Invalid credentials.";

  const lockTime = getLockTime(attempts);

  if(lockTime > 0){
    lockUntil = Date.now() + lockTime*1000;
    localStorage.setItem("lockUntil", lockUntil);
    checkLock();
  }

});

checkLock();
</script>

</body>
</html>
