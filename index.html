<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core Secure Portal</title>

<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#0f2a2c,#0b1c1e);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:20px;
width:380px;
text-align:center;
}

.logo{
width:95px;
margin-bottom:15px;
}

h1{
letter-spacing:4px;
font-size:28px;
margin-bottom:5px;
}

.subtitle{
color:#777;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:14px;
background:#4b5f77;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:#999;
cursor:not-allowed;
}

.lock{
color:red;
font-weight:bold;
margin-top:15px;
}

.footer{
margin-top:25px;
font-size:12px;
color:#777;
line-height:1.6;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>NEXUS CORE</h1>
<div class="subtitle">Secure Access Portal</div>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div id="lockMsg" class="lock"></div>

<div class="footer">

Unauthorized access is prohibited.<br>
All activity is logged and monitored.

<br><br>

© 2025 Nexus Core Systems

</div>

</div>

<script>

let attempts = localStorage.getItem("attempts") ? parseInt(localStorage.getItem("attempts")) : 0
let lockUntil = localStorage.getItem("lockUntil") ? parseInt(localStorage.getItem("lockUntil")) : 0

function login(){

let now = Date.now()

if(now < lockUntil){
return
}

var user=document.getElementById("user").value
var pass=document.getElementById("pass").value

if(user==="Nc001" && pass==="1234"){

localStorage.removeItem("attempts")
localStorage.removeItem("lockUntil")

window.location.href="https://lin.ee/lGGma6p"

}else{

attempts++
localStorage.setItem("attempts",attempts)

alert("ACCESS DENIED")

if(attempts%3===0){

let addTime = (attempts/3)*30000
lockUntil = Date.now()+addTime

localStorage.setItem("lockUntil",lockUntil)

}

updateLock()

}

}

function updateLock(){

let now = Date.now()
let btn=document.getElementById("loginBtn")
let msg=document.getElementById("lockMsg")

if(now < lockUntil){

let sec=Math.ceil((lockUntil-now)/1000)

btn.disabled=true
msg.innerText="SECURITY LOCK ACTIVE ("+sec+"s)"

setTimeout(updateLock,1000)

}else{

btn.disabled=false
msg.innerText=""

}

}

updateLock()

</script>

</body>
</html>
