<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE | Secure Access</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:Segoe UI, Arial, sans-serif;
    background:#eef2f5;
    color:#1f2933;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* HEADER */
.header{
    background:#1e2a34;
    color:#fff;
    padding:16px 24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
}

/* MAIN WRAPPER */
.main{
    flex:1;
    display:flex;
    justify-content:center;
    padding:30px 16px;
}

/* PANEL */
.panel{
    width:100%;
    max-width:460px;
    background:#fff;
    padding:36px 28px;
    border:1px solid #d7dde3;
}

/* Desktop behavior */
@media(min-width:900px){
    .main{
        align-items:center;
    }
}

/* Mobile behavior */
@media(max-width:899px){
    .main{
        align-items:flex-start;
    }
}

.logo{
    width:70px;
    display:block;
    margin:0 auto 20px auto;
}

h1{
    text-align:center;
    font-size:18px;
    margin:0;
    font-weight:600;
}

.subtitle{
    text-align:center;
    font-size:13px;
    color:#6b7280;
    margin:8px 0 24px 0;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:14px;
    border:1px solid #cbd5e1;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#1e2a34;
}

button{
    width:100%;
    padding:12px;
    background:#1e2a34;
    color:#fff;
    border:none;
    font-size:14px;
    cursor:pointer;
}

button:hover{
    background:#162028;
}

#msg{
    margin-top:12px;
    font-size:12px;
    min-height:18px;
}

.footer{
    text-align:center;
    font-size:11px;
    padding:14px;
    border-top:1px solid #d7dde3;
    background:#f6f8fa;
    color:#6b7280;
}
</style>
</head>

<body>

<div class="header">
    <div>เน็กซัส คอร์</div>
    <div id="datetime"></div>
</div>

<div class="main">
<div class="panel">

<img src="logo.png" class="logo" alt="logo">

<h1>การตรวจสอบสิทธิ์ที่ปลอดภัย</h1>
<div class="subtitle">เฉพาะบุคลากรที่ได้รับอนุญาตเท่านั้น</div>

<input type="text" id="card" placeholder="รหัสประจำตัว">
<input type="password" id="pass" placeholder="รหัสผ่าน">

<button id="loginBtn">เข้าสู่ระบบ</button>
<div id="msg"></div>

</div>
</div>

<div class="footer">
การเข้าถึงโดยไม่ได้รับอนุญาตเป็นสิ่งต้องห้ามและอาจถูกตรวจสอบ
</div>

<script>
document.addEventListener("DOMContentLoaded",function(){

function updateTime(){
    const now=new Date();
    document.getElementById("datetime").innerText=
        now.toLocaleDateString()+" "+now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();

});
</script>

</body>
</html>
