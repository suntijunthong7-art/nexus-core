<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core Secure Portal</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(180deg,#0f2a2c,#0b1c1e);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:20px;
width:380px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.logo{
width:95px;
margin-bottom:15px;
}

h1{
letter-spacing:4px;
font-size:28px;
margin:5px 0;
}

.subtitle{
color:#777;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

button{
width:100%;
padding:14px;
background:#4b5f77;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
font-size:15px;
cursor:pointer;
}

button:disabled{
background:#999;
cursor:not-allowed;
}

.lock{
margin-top:10px;
font-weight:bold;
color:red;
}

.footer{
margin-top:25px;
font-size:12px;
color:#777;
line-height:1.6;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>NEXUS CORE</h1>
<div class="subtitle">Secure Access Portal</div>

<p>
SYSTEM ID: NX-CORE-771A<br>
SECURITY LEVEL: OMEGA
</p>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div id="lockMsg" class="lock"></div>

<div class="footer">

Unauthorized access is prohibited.<br>
All access is logged and monitored.

<br><br>

Nexus Core Lab — Advanced Research Division<br>
© 2025 Nexus Core Systems

</div>

</div>

<script>

let failCount = localStorage.getItem("failCount") || 0
let lockUntil = localStorage.getItem("lockUntil") || 0

failCount = parseInt(failCount)
lockUntil = parseInt(lockUntil)

function login(){

let now = Date.now()

if(now < lockUntil){
return
}

var user=document.getElementById("user").value
var pass=document.getElementById("pass").value

if(user==="Nc001" && pass==="1234"){

localStorage.removeItem("failCount")
localStorage.removeItem("lockUntil")

window.location.href="https://lin.ee/lGGma6p"

}else{

failCount++
localStorage.setItem("failCount",failCount)

alert("ACCESS DENIED")

if(failCount%3===0){

let extraTime = (failCount/3) * 30

lockUntil = Date.now() + extraTime*1000

localStorage.setItem("lockUntil",lockUntil)

updateLock()

}

}

}

function updateLock(){

let now = Date.now()

if(now < lockUntil){

let seconds = Math.ceil((lockUntil-now)/1000)

document.getElementById("lockMsg").innerHTML =
"SECURITY LOCK ACTIVE ("+seconds+"s)"

document.getElementById("loginBtn").disabled = true

setTimeout(updateLock,1000)

}else{

document.getElementById("lockMsg").innerHTML = ""
document.getElementById("loginBtn").disabled = false

}

}

updateLock()

</script>

</body>
</html>
