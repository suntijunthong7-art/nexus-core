<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core | Secure Access</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#ffffff;
  width:100%;
  max-width:360px;
  padding:40px 30px;
  border-radius:8px;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
  text-align:center;
}

.logo{
  width:90px;
  margin-bottom:10px;
}

.company{
  font-size:13px;
  letter-spacing:2px;
  color:#6b7280;
  margin-bottom:5px;
}

h1{
  font-size:18px;
  margin:0 0 25px 0;
  color:#1f2937;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #d1d5db;
  border-radius:6px;
  font-size:14px;
  background:#ffffff;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#1f2937;
  color:#ffffff;
  font-weight:600;
  cursor:pointer;
}

button:disabled{
  background:#9ca3af;
  cursor:not-allowed;
}

.message{
  margin-top:15px;
  font-size:13px;
  color:#dc2626;
  min-height:20px;
}

.footer{
  margin-top:25px;
  font-size:11px;
  color:#6b7280;
}
</style>
</head>

<body>

<div class="container">

  <img src="logo.png" class="logo" alt="Logo">

  <div class="company">NEXUS CORE SYSTEM</div>
  <h1>Secure Access Portal</h1>

  <input type="text" id="user" placeholder="User ID">
  <input type="password" id="pass" placeholder="Password">

  <button id="loginBtn">SIGN IN</button>

  <div class="message" id="message"></div>

  <div class="footer">
    © 2025 Nexus Core. All rights reserved.
  </div>

</div>

<script>
let failCount = 0;
let lockUntil = 0;
let countdownInterval = null;

const btn = document.getElementById("loginBtn");
const message = document.getElementById("message");

btn.addEventListener("click", function(){

  if(Date.now() < lockUntil){
    return;
  }

  // จำลองว่าล็อกอินผิดเสมอ
  failCount++;

  if(failCount === 3){
    lockAccount(30);
  }
  else if(failCount === 6){
    lockAccount(90);
  }
  else if(failCount === 9){
    lockAccount(180);
  }
  else{
    message.textContent = "Invalid credentials.";
  }

});

function lockAccount(seconds){

  lockUntil = Date.now() + (seconds * 1000);
  btn.disabled = true;

  updateCountdown(seconds);

  countdownInterval = setInterval(function(){

    let remaining = Math.ceil((lockUntil - Date.now())/1000);

    if(remaining <= 0){
      clearInterval(countdownInterval);
      btn.disabled = false;
      message.textContent = "";
      return;
    }

    updateCountdown(remaining);

  },1000);
}

function updateCountdown(seconds){
  message.textContent = 
    "Account locked. Try again in " + seconds + " seconds.";
}
</script>

</body>
</html>
