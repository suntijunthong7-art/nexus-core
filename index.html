<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core | Secure Access</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#fff;
  width:100%;
  max-width:360px;
  padding:40px 30px;
  border-radius:8px;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
  text-align:center;
}

.logo{
  width:90px;
  margin-bottom:10px;
}

.company{
  font-size:13px;
  letter-spacing:2px;
  color:#6b7280;
  margin-bottom:5px;
}

h1{
  font-size:18px;
  margin:0 0 25px 0;
  color:#1f2937;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #d1d5db;
  border-radius:6px;
  font-size:14px;
  background:#fff;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#1f2937;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

button:disabled{
  background:#9ca3af;
  cursor:not-allowed;
}

.message{
  margin-top:10px;
  font-size:13px;
  color:#dc2626;
  min-height:18px;
}

.footer{
  margin-top:25px;
  font-size:11px;
  color:#6b7280;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo" alt="Nexus Core Logo">

<div class="company">NEXUS CORE SYSTEM</div>
<h1>Secure Access Portal</h1>

<input type="text" id="user" placeholder="User ID">
<input type="password" id="pass" placeholder="Password">

<button id="loginBtn">SIGN IN</button>

<div class="message" id="message"></div>

<div class="footer">
© 2025 Nexus Core. All rights reserved.
</div>

</div>

<script>
const correctUser = "admin";
const correctPass = "1234";

let failedAttempts = parseInt(localStorage.getItem("failedAttempts")) || 0;
let lockUntil = parseInt(localStorage.getItem("lockUntil")) || 0;

const loginBtn = document.getElementById("loginBtn");
const message = document.getElementById("message");

function checkLock() {
  const now = Date.now();

  if (lockUntil > now) {
    const remaining = Math.ceil((lockUntil - now)/1000);
    loginBtn.disabled = true;
    message.innerText = "Account locked. Try again in " + remaining + "s";
    setTimeout(checkLock,1000);
  } else {
    loginBtn.disabled = false;
    message.innerText = "";
  }
}

checkLock();

loginBtn.addEventListener("click", function(){

  const now = Date.now();
  if (lockUntil > now) return;

  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if(user === correctUser && pass === correctPass){
    alert("Login successful");
    failedAttempts = 0;
    localStorage.clear();
  }else{
    failedAttempts++;
    localStorage.setItem("failedAttempts", failedAttempts);

    let lockTime = 0;

    if(failedAttempts >= 9){
      lockTime = 180;
    } else if(failedAttempts >= 6){
      lockTime = 90;
    } else if(failedAttempts >= 3){
      lockTime = 30;
    }

    if(lockTime > 0){
      lockUntil = Date.now() + lockTime*1000;
      localStorage.setItem("lockUntil", lockUntil);
      checkLock();
    } else {
      message.innerText = "Invalid credentials ("+failedAttempts+")";
    }
  }
});
</script>

</body>
</html>
