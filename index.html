<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#0b2a36,#0f4c5c);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.card{
background:#f4f6f8;
padding:35px;
width:340px;
border-radius:18px;
box-shadow:0 20px 60px rgba(0,0,0,0.45);
text-align:center;
}

.logo{
width:80px;
margin-bottom:10px;
}

.title{
font-size:22px;
font-weight:700;
letter-spacing:1px;
color:#1f2933;
}

.subtitle{
color:#6b7280;
font-size:14px;
margin-bottom:15px;
}

.sysinfo{
font-size:12px;
color:#6b7280;
margin-bottom:18px;
line-height:1.6;
}

input{
width:100%;
padding:11px;
margin:6px 0;
border-radius:8px;
border:1px solid #cbd5e1;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#334155;
color:white;
font-weight:bold;
letter-spacing:1px;
cursor:pointer;
}

button:disabled{
background:#94a3b8;
}

.status{
font-size:12px;
margin-top:12px;
color:#475569;
}

.log{
background:#1f2933;
color:#d1d5db;
font-size:11px;
padding:12px;
margin-top:15px;
border-radius:8px;
text-align:left;
height:70px;
overflow:hidden;
font-family:monospace;
border:1px solid #374151;
}

.footer{
font-size:11px;
margin-top:15px;
color:#6b7280;
}

</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<div class="title">NEXUS CORE SYSTEM</div>
<div class="subtitle">Secure Access Portal</div>

<div class="sysinfo">
SYSTEM ID: NX-CORE-771A<br>
SECURITY LEVEL: OMEGA<br>
NETWORK NODE: GLOBAL GRID
</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div class="status">
System Status: ONLINE | Encryption: AES-256
</div>

<div class="log" id="log"></div>

<div class="footer">
Authorized personnel only. All access is logged and monitored.<br>
© 2025 Nexus Core Systems
</div>

</div>

<script>

const ADMIN_ID="admin"
const ADMIN_PASS="1234"
const LINE_URL="https://lin.ee/lGGma6p"

let attempts=0
let lockUntil=0

const logBox=document.getElementById("log")

function time(){
let d=new Date()
return d.toLocaleTimeString()
}

function addLog(text){
logBox.innerHTML+="["+time()+"] "+text+"<br>"
logBox.scrollTop=logBox.scrollHeight
}

function boot(){

addLog("nexus core boot sequence initialized")
setTimeout(()=>addLog("secure connection established"),800)
setTimeout(()=>addLog("authentication service ready"),1600)
setTimeout(()=>addLog("system monitoring active"),2300)

}

function login(){

let id=document.getElementById("user").value
let pw=document.getElementById("pass").value

let now=Date.now()

if(lockUntil>now){

addLog("access temporarily locked")
return

}

if(id===ADMIN_ID && pw===ADMIN_PASS){

addLog("authentication successful")
setTimeout(()=>{
window.location.href=LINE_URL
},900)

return

}

attempts++

addLog("invalid credentials attempt")

if(attempts>=1){

lockUntil=Date.now()+30000
addLog("security lock engaged (30s)")

}

}

boot()

</script>

</body>
</html>
