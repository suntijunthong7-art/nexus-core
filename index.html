<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0d3b46;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
background:white;
width:340px;
padding:35px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

.logo{
width:70px;
margin-bottom:10px;
}

h1{
font-size:22px;
letter-spacing:2px;
margin:5px 0;
}

.subtitle{
color:#666;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#3a4b5c;
color:white;
font-weight:bold;
margin-top:10px;
cursor:pointer;
transition:all .2s;
}

button:hover{
background:#2e3c4b;
}

button:disabled{
background:#9aa3af;
cursor:not-allowed;
}

.security{
color:red;
margin-top:10px;
font-size:14px;
}

.footer{
margin-top:20px;
font-size:12px;
color:#777;
}

#dashboard{
display:none;
color:white;
text-align:center;
}

</style>
</head>

<body>

<div class="container" id="loginBox">

<img class="logo" src="https://cdn-icons-png.flaticon.com/512/4712/4712100.png">

<h1>NEXUS CORE SYSTEM</h1>

<div class="subtitle">Secure Access Portal</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div class="security" id="lockMsg"></div>

<div class="footer">
Authorized personnel only. Unauthorized access is strictly prohibited and monitored.<br><br>
© 2025 Nexus Core Systems<br>
Internal Access Gateway v2.4.1
</div>

</div>

<div id="dashboard">

<h1>ACCESS GRANTED</h1>

<p>Welcome Administrator</p>

<p>Nexus Core Internal System</p>

<button onclick="logout()">Logout</button>

</div>

<script>

let attempts=0
let locked=false
let timer=0

function login(){

if(locked)return

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

let btn=document.getElementById("loginBtn")

btn.innerText="Authenticating..."

setTimeout(()=>{

if(u==="admin" && p==="1234"){

sessionStorage.setItem("login","true")

document.getElementById("loginBox").style.display="none"
document.getElementById("dashboard").style.display="block"

}

else{

attempts++

btn.innerText="SIGN IN"

if(attempts>=3){

lockSystem()

}else{

alert("Access Denied")

}

}

},1000)

}

function lockSystem(){

locked=true
timer=30

let btn=document.getElementById("loginBtn")
btn.disabled=true

let msg=document.getElementById("lockMsg")

let interval=setInterval(()=>{

msg.innerText="Security Lock Active — Retry in "+timer+"s"

timer--

if(timer<0){

clearInterval(interval)

locked=false
btn.disabled=false
msg.innerText=""
attempts=0

}

},1000)

}

function logout(){

sessionStorage.removeItem("login")
location.reload()

}

if(sessionStorage.getItem("login")==="true"){

document.getElementById("loginBox").style.display="none"
document.getElementById("dashboard").style.display="block"

}

</script>

</body>
</html>
