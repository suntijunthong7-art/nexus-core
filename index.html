<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NEXUS CORE | Restricted Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Share Tech Mono', monospace;
    overflow:hidden;
}

/* scanline effect */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background: repeating-linear-gradient(
        to bottom,
        rgba(0,255,0,0.05),
        rgba(0,255,0,0.05) 2px,
        transparent 2px,
        transparent 4px
    );
    pointer-events:none;
}

.card{
    position:relative;
    background:#050505;
    border:1px solid #00ff66;
    padding:40px;
    width:360px;
    box-shadow:0 0 30px #00ff66;
    color:#00ff66;
    text-align:center;
}

.logo{
    width:100px;
    margin-bottom:15px;
    filter: brightness(0) saturate(100%) invert(61%) sepia(96%) saturate(550%) hue-rotate(95deg);
}

h1{
    margin:10px 0;
    letter-spacing:2px;
}

.status{
    font-size:12px;
    margin-bottom:20px;
    color:#00ff66;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    background:black;
    border:1px solid #00ff66;
    color:#00ff66;
    font-family:'Share Tech Mono', monospace;
}

input:focus{
    outline:none;
    box-shadow:0 0 10px #00ff66;
}

button{
    width:100%;
    padding:10px;
    margin-top:15px;
    background:#00ff66;
    border:none;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00cc55;
    box-shadow:0 0 15px #00ff66;
}

.footer{
    margin-top:20px;
    font-size:10px;
    opacity:0.7;
}

</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h1>NEXUS CORE</h1>

<div class="status">
SYSTEM STATUS: SECURE<br>
CLEARANCE LEVEL: OMEGA
</div>

<input type="text" placeholder="ENTER USERNAME">
<input type="password" placeholder="ENTER ACCESS CODE">

<button>INITIATE ACCESS</button>

<div class="footer">
RESTRICTED AREA • UNAUTHORIZED ACCESS PROHIBITED
</div>

</div>

</body>
</html>
