<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0c3b46,#0a2e36);
font-family:Arial,Helvetica,sans-serif;
}

.portal{
background:white;
width:340px;
padding:35px;
border-radius:12px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.logo{
width:60px;
height:60px;
object-fit:contain;
margin-bottom:12px;
}

h1{
font-size:16px;
letter-spacing:1px;
margin:5px 0;
color:#222;
}

.subtitle{
font-size:13px;
color:#666;
margin-bottom:20px;
}

input{
width:100%;
padding:11px;
margin:7px 0;
border-radius:6px;
border:1px solid #ddd;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#2f4058;
color:white;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

button:disabled{
background:#888;
cursor:not-allowed;
}

.status{
margin-top:12px;
font-size:13px;
color:#c33;
min-height:18px;
}

.footer{
margin-top:15px;
font-size:11px;
color:#777;
}

</style>
</head>

<body>

<div class="portal">

<img src="logo.png" class="logo" onerror="this.style.display='none'">

<h1>NEXUS CORE SYSTEM</h1>
<div class="subtitle">Secure Access Portal</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()" id="loginBtn">SIGN IN</button>

<div class="status" id="status"></div>

<div class="footer">
Authorized personnel only. All access is logged and monitored.<br>
© 2025 Nexus Core Systems<br>
Internal Access Gateway v2.4.1
</div>

</div>

<script>

let attempts = 0
let lockUntil = 0

function login(){

const user = document.getElementById("user").value
const pass = document.getElementById("pass").value
const status = document.getElementById("status")

if(Date.now() < lockUntil){
return
}

if(user==="admin" && pass==="1234"){

status.style.color="green"
status.innerText="Authentication successful"

setTimeout(()=>{
window.location.href="https://lin.ee/lGGma6p"
},1000)

}
else{

attempts++
status.style.color="#c33"
status.innerText="Authentication failed"

let lockTime=0

if(attempts>=9){
lockTime=180
}
else if(attempts>=6){
lockTime=90
}
else if(attempts>=3){
lockTime=30
}

if(lockTime>0){
lock(lockTime)
}

}

}

function lock(seconds){

const btn=document.getElementById("loginBtn")
const status=document.getElementById("status")

lockUntil=Date.now()+seconds*1000

btn.disabled=true

let timer=setInterval(()=>{

let remain=Math.ceil((lockUntil-Date.now())/1000)

if(remain<=0){
clearInterval(timer)
btn.disabled=false
status.innerText=""
return
}

status.innerText="Security Lock Active — Retry in "+remain+"s"

},1000)

}

</script>

</body>
</html>
