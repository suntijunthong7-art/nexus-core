<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE SYSTEM</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0a2a34,#0f4c5c);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.card{
background:white;
width:360px;
padding:40px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
text-align:center;
}

.logo{
width:110px;
margin-bottom:20px;
}

.title{
font-size:22px;
font-weight:bold;
letter-spacing:2px;
}

.subtitle{
color:#666;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#354a63;
color:white;
font-weight:bold;
font-size:15px;
cursor:pointer;
}

button:disabled{
background:#999;
}

#msg{
margin-top:10px;
color:red;
font-size:13px;
}

.footer{
margin-top:18px;
font-size:11px;
color:#777;
}

</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<div class="title">NEXUS CORE SYSTEM</div>
<div class="subtitle">Secure Access Portal</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()" id="btn">SIGN IN</button>

<div id="msg"></div>

<div class="footer">
Authorized personnel only. All access is logged and monitored.<br>
© 2025 Nexus Core Systems
</div>

</div>

<script>

let failCount = localStorage.getItem("failCount") || 0
let lockUntil = localStorage.getItem("lockUntil") || 0

function updateLock(){

let now = Date.now()

if(now < lockUntil){

let remain = Math.ceil((lockUntil-now)/1000)

document.getElementById("msg").innerText =
"Security Lock Active — Retry in "+remain+"s"

document.getElementById("btn").disabled = true

setTimeout(updateLock,1000)

}else{

document.getElementById("btn").disabled = false
document.getElementById("msg").innerText=""

}

}

function login(){

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value

if(Date.now() < lockUntil)return

if(user==="admin" && pass==="1234"){

failCount=0
localStorage.setItem("failCount",0)

window.location.href="https://lin.ee/lGGma6p"

}else{

failCount++

localStorage.setItem("failCount",failCount)

let lockTime=0

if(failCount==3) lockTime=30
if(failCount==6) lockTime=90
if(failCount>=9) lockTime=180

if(lockTime>0){

lockUntil=Date.now()+lockTime*1000

localStorage.setItem("lockUntil",lockUntil)

updateLock()

}else{

document.getElementById("msg").innerText="Invalid credentials"

}

}

}

updateLock()

</script>

</body>
</html>
