<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core Secure Portal</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#071a1f;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
color:#333;
}

.container{
background:white;
padding:40px;
border-radius:14px;
width:320px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.logo{
width:70px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
background:#2e3f55;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:disabled{
opacity:.6;
cursor:not-allowed;
}

.footer{
font-size:11px;
color:#777;
margin-top:20px;
}

/* modal */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
display:none;
align-items:center;
justify-content:center;
}
button{
transition:0.2s;
}

button:hover{
background:#162333;
}

button:active{
transform:scale(0.97);
}
.modal-box{
background:white;
padding:25px;
border-radius:10px;
width:280px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.3);
animation:popup .25s ease;
}

.modal-box h2{
margin:0;
font-size:18px;
}

.modal-box p{
font-size:13px;
color:#555;
margin:10px 0 20px 0;
}

.dismiss{
background:#34495e;
}

@keyframes popup{
from{transform:scale(.8);opacity:0}
to{transform:scale(1);opacity:1}
}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h3>Nexus Core Secure Portal</h3>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div class="footer">
Unauthorized access is prohibited.<br>
All activity is logged and monitored.<br><br>
© 2025 Nexus Core Systems
</div>

</div>


<!-- modal -->

<div class="modal" id="modal">
<div class="modal-box">

<h2>ACCESS DENIED</h2>

<p id="msg">
Invalid credentials detected.<br>
Security event logged.
</p>

<button class="dismiss" onclick="closeModal()">DISMISS</button>

</div>
</div>


<script>

function login(){

let btn=document.getElementById("loginBtn")

btn.innerText="Authenticating..."
btn.disabled=true

setTimeout(checkLogin,1200)

}

function checkLogin(){

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value

/* USER PASS ของคุณยังคงเดิม */

if(user==="admin" && pass==="1234"){

window.location.href="https://lin.ee/lGGma6p"

}else{

showError()

}

let btn=document.getElementById("loginBtn")
btn.innerText="SIGN IN"
btn.disabled=false

}

function showError(){

let now=new Date()
let time=now.toLocaleTimeString()

document.getElementById("msg").innerHTML=
"Invalid credentials detected.<br>Security event logged : "+time

document.getElementById("modal").style.display="flex"

}

function closeModal(){
document.getElementById("modal").style.display="none"
}

</script>

</body>
</html>
