<body>

<div class="topbar">
<div>INTERNAL NETWORK</div>
<div id="time"></div>
</div>

<div class="container">

<div style="text-align:center;margin-bottom:20px;">
<img src="logo.png" style="width:90px;">
</div>

<h3>IDENTITY VERIFICATION</h3>

<input id="card" placeholder="Card ID">
<input id="pass" type="password" placeholder="Password">
<button id="loginBtn">Authenticate</button>
<div class="message" id="msg"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded",function(){

const correctCard="LC-A01";
const correctPass="Lc1993♧";

let attempts=0;

const card=document.getElementById("card");
const pass=document.getElementById("pass");
const btn=document.getElementById("loginBtn");
const msg=document.getElementById("msg");

btn.onclick=function(){

if(card.value===correctCard && pass.value===correctPass){
msg.style.color="lime";
msg.innerText="ACCESS GRANTED";
return;
}

attempts++;

if(attempts>=3){
msg.style.color="red";
msg.innerText="SYSTEM LOCKED";
btn.disabled=true;
return;
}

msg.style.color="red";
msg.innerText="ACCESS DENIED ("+attempts+"/3)";
pass.value="";
};

function updateTime(){
const now=new Date();
document.getElementById("time").innerText=
now.toLocaleDateString()+" "+now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();

});
</script>

</body>
</html>
