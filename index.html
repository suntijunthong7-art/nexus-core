<script>
const correctCard = "LC-A01";
const correctPass = "Lc1993♧";

let failCount = 0;
let lockUntil = 0;
let timerInterval = null;

function authenticate() {
    const now = Date.now();
    const message = document.getElementById("message");

    if (now < lockUntil) {
        return;
    }

    const card = document.getElementById("card").value.trim();
    const pass = document.getElementById("pass").value.trim();

    if (card === correctCard && pass === correctPass) {
        message.style.color = "lime";
        message.innerText = "ยืนยันตัวตนสำเร็จ กำลังเข้าสู่ระบบ...";
        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1500);
    } else {
        failCount++;
        message.style.color = "red";
        message.innerText = "ข้อมูลไม่ถูกต้อง";

        if (failCount === 3) lockSystem(30);
        if (failCount === 6) lockSystem(60);
        if (failCount === 9) lockSystem(180);
    }
}

function lockSystem(seconds) {
    const message = document.getElementById("message");
    const button = document.getElementById("loginBtn");

    lockUntil = Date.now() + seconds * 1000;
    button.disabled = true;

    timerInterval = setInterval(() => {
        const remaining = Math.ceil((lockUntil - Date.now()) / 1000);

        if (remaining <= 0) {
            clearInterval(timerInterval);
            button.disabled = false;
            message.innerText = "";
        } else {
            message.style.color = "orange";
            message.innerText = `ระบบล็อกอยู่ โปรดลองใหม่อีกครั้งใน ${remaining} วินาที`;
        }
    }, 1000);
}
</script>
