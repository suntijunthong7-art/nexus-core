<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">

<!-- บังคับ mobile viewport -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Access Control System</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

html,body{
    font-family:'Sarabun',sans-serif;
    background:#cfd5d9;
    color:#2b2b2b;
}

/* HEADER */
.header{
    width:100%;
    background:#24343d;
    color:#fff;
    padding:14px 16px;
    display:flex;
    justify-content:space-between;
    font-size:13px;
}

/* MAIN */
.main{
    width:100%;
    padding:28px 14px 50px 14px;
}

/* PANEL */
.panel{
    width:100%;
    max-width:520px;
    margin:0 auto;
    background:#ffffff;
    border:1px solid #5f6a72;
    padding:36px 24px;
    box-shadow:0 8px 22px rgba(0,0,0,0.08);
}

/* LOGO */
.logo{
    width:70px;
    display:block;
    margin:0 auto 18px auto;
}

/* TEXT */
h1{
    text-align:center;
    font-size:18px;
    margin-bottom:6px;
    font-weight:600;
}

.subtitle{
    text-align:center;
    font-size:13px;
    margin-bottom:22px;
    color:#555;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin-bottom:14px;
    border:1px solid #7a848b;
    font-size:14px;
    background:#f2f4f5;
}

input:focus{
    outline:none;
    background:#fff;
    border-color:#24343d;
}

/* BUTTON */
button{
    width:100%;
    padding:13px;
    background:#2f4a56;
    color:#fff;
    border:none;
    font-size:14px;
    cursor:pointer;
}

button:hover{
    background:#22363f;
}

/* STATUS */
.status{
    margin-top:14px;
    font-size:13px;
    text-align:center;
}

.success{color:#1b7a28;}
.error{color:#b00020;}

.notice{
    margin-top:20px;
    font-size:12px;
    border-top:1px solid #d6d6d6;
    padding-top:14px;
    color:#444;
    line-height:1.6;
}

/* FOOTER */
.footer{
    width:100%;
    text-align:center;
    font-size:11px;
    padding:14px;
    background:#eef1f3;
    border-top:1px solid #c7cbd0;
    color:#555;
}
</style>
</head>

<body>

<div class="header">
    <div>ศูนย์ควบคุมสิทธิ์การเข้าถึง</div>
    <div id="datetime"></div>
</div>

<div class="main">
<div class="panel">

<img src="logo.png" class="logo" alt="logo">

<h1>ระบบตรวจสอบสิทธิการเข้าใช้งาน</h1>
<div class="subtitle">Access Control System</div>

<input type="text" id="card" placeholder="รหัสประจำตัวเจ้าหน้าที่">
<input type="password" id="pass" placeholder="รหัสผ่าน">

<button onclick="login()">เข้าสู่ระบบ</button>

<div class="status" id="status"></div>

<div class="notice">
การเข้าถึงระบบโดยไม่ได้รับอนุญาต อาจมีความผิดตามกฎหมายที่เกี่ยวข้อง
</div>

</div>
</div>

<div class="footer">
© 2569 หน่วยงานกลางด้านความมั่นคงสารสนเทศ | เวอร์ชันระบบ 1.0.3
</div>

<script>
const correctCard = "LC-A01";
const correctPass = "Lc1993♧";

function login(){
    const card = document.getElementById("card").value.trim();
    const pass = document.getElementById("pass").value.trim();
    const status = document.getElementById("status");

    if(card === correctCard && pass === correctPass){
        status.innerHTML = "ยืนยันตัวตนสำเร็จ";
        status.className = "status success";
    }else{
        status.innerHTML = "ข้อมูลไม่ถูกต้อง";
        status.className = "status error";
    }
}

function updateTime(){
    const now = new Date();
    document.getElementById("datetime").innerText =
        now.toLocaleDateString("th-TH") + " " +
        now.toLocaleTimeString("th-TH");
}
setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
