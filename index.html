<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NEXUS CORE | Federal Secure Access</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;
    background:#0b1a2a;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Roboto', sans-serif;
}

/* subtle background grid */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:40px 40px;
}

.card{
    position:relative;
    background:#111c2e;
    width:420px;
    padding:50px;
    border-radius:8px;
    box-shadow:0 0 40px rgba(0,0,0,0.8);
    color:white;
    text-align:center;
    border-top:4px solid #caa64d;
}

.logo{
    width:110px;
    margin-bottom:20px;
}

h1{
    margin:10px 0 5px;
    font-weight:700;
    letter-spacing:2px;
}

.subtitle{
    font-size:12px;
    color:#aab4c4;
    margin-bottom:30px;
    letter-spacing:1px;
}

input{
    width:100%;
    padding:14px;
    margin:12px 0;
    background:#0d1624;
    border:1px solid #2b3b52;
    color:white;
    font-size:14px;
}

input:focus{
    outline:none;
    border:1px solid #caa64d;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    background:#caa64d;
    border:none;
    color:#111;
    font-weight:700;
    letter-spacing:1px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#e0bb63;
}

.footer{
    margin-top:30px;
    font-size:11px;
    color:#7f8da3;
}

.warning{
    margin-top:15px;
    font-size:11px;
    color:#caa64d;
}

</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h1>NEXUS CORE</h1>
<div class="subtitle">FEDERAL INTELLIGENCE DIVISION</div>

<input type="text" placeholder="AGENT IDENTIFICATION">
<input type="password" placeholder="SECURITY CLEARANCE CODE">

<button>AUTHORIZED ACCESS</button>

<div class="warning">
OFFICIAL USE ONLY
</div>

<div class="footer">
Unauthorized access is a violation of federal law.<br>
© 2026 NEXUS CORE INTELLIGENCE AUTHORITY
</div>

</div>

</body>
</html>
