<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE - Access Control</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Tahoma,sans-serif;}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#1f2d3a,#2f4454);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.card{
  width:95%;
  max-width:560px;
  background:#fff;
  padding:55px 45px;
  border-radius:22px;
  box-shadow:0 30px 70px rgba(0,0,0,0.4);
  text-align:center;
  transition:0.3s;
}

.logo{width:120px;margin-bottom:15px;}

h2{font-size:28px;margin-bottom:5px;}
.subtitle{color:#666;margin-bottom:35px;}

input{
  width:100%;
  padding:15px;
  margin-bottom:18px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:15px;
}

input:focus{
  outline:none;
  border-color:#2f4454;
  box-shadow:0 0 0 3px rgba(47,68,84,0.15);
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:#2f4454;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{background:#1c2731;}
button:disabled{background:gray;cursor:not-allowed;}

.error{
  color:#c62828;
  margin-bottom:12px;
  min-height:20px;
}

.status-bar{
  margin-top:20px;
  font-size:13px;
  color:#bbb;
  text-align:center;
}

.footer{
  margin-top:18px;
  font-size:13px;
  color:#aaa;
}

.shake{
  animation:shake 0.3s;
}
@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(-5px);}
  50%{transform:translateX(5px);}
  75%{transform:translateX(-5px);}
  100%{transform:translateX(0);}
}
</style>
</head>

<body>

<div class="card" id="cardBox">
  <img src="logo.png" class="logo">
  <h2>NEXUS CORE</h2>
  <div class="subtitle">Enterprise Access Control System</div>

  <div class="error" id="errorMsg"></div>

  <input type="text" id="card" placeholder="รหัสประจำตัวเจ้าหน้าที่">
  <input type="password" id="pass" placeholder="รหัสผ่าน">

  <button onclick="login()" id="loginBtn">เข้าสู่ระบบ</button>

  <div class="footer">
    © 2026 NEXUS CORE Security Division
  </div>
</div>

<div class="status-bar">
  System Secure • TLS Encrypted • Session Monitoring Active
</div>

<script>
const correctCard="LC-A01";
const correctPass="Lc1993♧";

let attempts=parseInt(localStorage.getItem("attempts"))||0;
let lockUntil=parseInt(localStorage.getItem("lockUntil"))||0;

checkLock();

function login(){

  if(Date.now()<lockUntil){
    return;
  }

  const btn=document.getElementById("loginBtn");
  btn.innerText="กำลังตรวจสอบ...";
  btn.disabled=true;

  setTimeout(()=>{

    let card=document.getElementById("card").value;
    let pass=document.getElementById("pass").value;

    if(card===correctCard && pass===correctPass){
        localStorage.setItem("loggedIn","true");
        location.reload();
    }else{
        attempts++;
        localStorage.setItem("attempts",attempts);

        if(attempts==3) lock(60000);
        else if(attempts==6) lock(180000);
        else if(attempts>=9) lock(600000);

        showError("รหัสไม่ถูกต้อง");
        shake();
        btn.innerText="เข้าสู่ระบบ";
        btn.disabled=false;
    }

  },1000);
}

function lock(duration){
  lockUntil=Date.now()+duration;
  localStorage.setItem("lockUntil",lockUntil);
  startCountdown();
}

function checkLock(){
  if(Date.now()<lockUntil){
    startCountdown();
  }
}

function startCountdown(){
  const btn=document.getElementById("loginBtn");
  btn.disabled=true;

  let interval=setInterval(()=>{
    let remaining=lockUntil-Date.now();

    if(remaining<=0){
      clearInterval(interval);
      localStorage.removeItem("lockUntil");
      localStorage.setItem("attempts",0);
      attempts=0;
      document.getElementById("errorMsg").innerText="";
      btn.disabled=false;
      btn.innerText="เข้าสู่ระบบ";
      return;
    }

    let sec=Math.floor(remaining/1000);
    document.getElementById("errorMsg").innerText=
      "บัญชีถูกล็อค กรุณารอ "+sec+" วินาที";
  },1000);
}

function showError(msg){
  document.getElementById("errorMsg").innerText=msg;
}

function shake(){
  const box=document.getElementById("cardBox");
  box.classList.add("shake");
  setTimeout(()=>box.classList.remove("shake"),300);
}

window.onload=function(){
  if(localStorage.getItem("loggedIn")==="true"){
    document.body.innerHTML=
    "<h1 style='color:white;margin-top:40vh;'>WELCOME TO NEXUS CORE</h1>";
  }
}
</script>

</body>
</html>
