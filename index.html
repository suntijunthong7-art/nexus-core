<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core | Secure Access</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#fff;
  width:100%;
  max-width:360px;
  padding:40px 30px;
  border-radius:8px;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #d1d5db;
  border-radius:6px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#1f2937;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:disabled{
  background:#9ca3af;
  cursor:not-allowed;
}

.message{
  margin-top:10px;
  font-size:14px;
}

.timer{
  color:red;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Secure Access Portal</h2>

<input type="text" id="user" placeholder="User ID">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">SIGN IN</button>

<div class="message" id="message"></div>

</div>

<script>
const correctUser = "LC-A01";
const correctPass = "Lc1993♧";

let attempts = 0;
let locked = false;

function login(){
  if(locked) return;

  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;
  const msg = document.getElementById("message");
  const btn = document.querySelector("button");

  if(user === correctUser && pass === correctPass){
    msg.style.color = "green";
    msg.innerHTML = "Access Granted";
    attempts = 0;
  } else {
    attempts++;
    msg.style.color = "red";
    msg.innerHTML = "Invalid credentials (" + attempts + " attempts)";
    
    if(attempts === 3){
      lockSystem(30); // ล็อก 30 วินาที
    }
    if(attempts === 6){
      lockSystem(60); // ล็อก 60 วินาที
    }
    if(attempts === 9){
      lockSystem(120); // ล็อก 120 วินาที
    }
  }
}

function lockSystem(seconds){
  const btn = document.querySelector("button");
  const msg = document.getElementById("message");

  locked = true;
  btn.disabled = true;

  let remaining = seconds;

  msg.innerHTML = "System Locked. Try again in <span class='timer'>" + remaining + "</span> seconds";

  const interval = setInterval(() => {
    remaining--;
    msg.innerHTML = "System Locked. Try again in <span class='timer'>" + remaining + "</span> seconds";

    if(remaining <= 0){
      clearInterval(interval);
      locked = false;
      btn.disabled = false;
      attempts = 0;
      msg.innerHTML = "";
    }
  }, 1000);
}
</script>

</body>
</html>
