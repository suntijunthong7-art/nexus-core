<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core | Secure Access</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#ffffff;
  width:100%;
  max-width:360px;
  padding:40px 30px;
  border-radius:8px;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
  text-align:center;
}

.logo{
  width:90px;
  margin-bottom:10px;
}

.company{
  font-size:13px;
  letter-spacing:2px;
  color:#6b7280;
  margin-bottom:5px;
}

h1{
  font-size:18px;
  margin:0 0 20px 0;
  color:#1f2937;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #d1d5db;
  border-radius:6px;
  font-size:14px;
  background:#fff;
}

input:focus{
  outline:none;
  border:1px solid #2563eb;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#1f2937;
  color:#ffffff;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#111827;
}

button:disabled{
  background:#9ca3af;
  cursor:not-allowed;
}

.message{
  font-size:13px;
  margin-bottom:15px;
  min-height:18px;
}

.error{
  color:#dc2626;
}

.success{
  color:#16a34a;
}

.footer{
  margin-top:25px;
  font-size:11px;
  color:#6b7280;
}
</style>
</head>

<body>

<div class="container">

  <img src="logo.png" class="logo" alt="Logo">

  <div class="company">NEXUS CORE SYSTEM</div>
  <h1>Secure Access Portal</h1>

  <div class="message" id="message"></div>

  <input type="text" id="userid" placeholder="User ID">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()" id="loginBtn">SIGN IN</button>

  <div class="footer">
    © 2025 Nexus Core. All rights reserved.
  </div>

</div>

<script>
function login(){
  const user = document.getElementById("userid").value.trim();
  const pass = document.getElementById("password").value.trim();
  const msg = document.getElementById("message");
  const btn = document.getElementById("loginBtn");

  msg.className = "message";

  if(user === "" || pass === ""){
    msg.textContent = "Please enter User ID and Password.";
    msg.classList.add("error");
    return;
  }

  // ตัวอย่างข้อมูลจำลอง
  const correctUser = "admin";
  const correctPass = "1234";

  btn.disabled = true;
  btn.textContent = "Authenticating...";

  setTimeout(() => {
    if(user === correctUser && pass === correctPass){
      msg.textContent = "Access Granted. Redirecting...";
      msg.classList.add("success");
      setTimeout(()=>{
        window.location.href = "dashboard.html";
      },1000);
    }else{
      msg.textContent = "Invalid credentials.";
      msg.classList.add("error");
      btn.disabled = false;
      btn.textContent = "SIGN IN";
    }
  },1000);
}
</script>

</body>
</html>
