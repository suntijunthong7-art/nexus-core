<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Access Portal</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#0b3a42;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:#ffffff;
padding:35px;
width:340px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
text-align:center;
}

.logo{
width:65px;
margin-bottom:12px;
}

h2{
margin:5px 0;
font-size:18px;
color:#222;
}

.sub{
font-size:13px;
color:#555;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
}

button{
width:100%;
padding:11px;
background:#2f3f55;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:#9aa4b2;
cursor:not-allowed;
}

#msg{
margin-top:12px;
font-size:13px;
color:#c0392b;
}

.footer{
margin-top:18px;
font-size:11px;
color:#777;
}

</style>
</head>

<body>

<div class="login-box">

<img src="logo.png" class="logo">

<h2>Secure Access Portal</h2>
<div class="sub">Authorized Personnel Only</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()" id="loginBtn">SIGN IN</button>

<div id="msg"></div>

<div class="footer">
Access is monitored and logged
</div>

</div>

<script>

const ADMIN_ID="admin"
const ADMIN_PASS="1234"

let fail = Number(localStorage.getItem("fail")) || 0
let lockUntil = Number(localStorage.getItem("lockUntil")) || 0

function updateLock(){

let now = Date.now()

if(now < lockUntil){

let remain = Math.ceil((lockUntil-now)/1000)

document.getElementById("loginBtn").disabled=true
document.getElementById("msg").innerText="Security lock active : "+remain+"s"

setTimeout(updateLock,1000)

}else{

document.getElementById("loginBtn").disabled=false
document.getElementById("msg").innerText=""

}

}

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

let now=Date.now()

if(now < lockUntil){
updateLock()
return
}

if(u===ADMIN_ID && p===ADMIN_PASS){

fail=0
localStorage.removeItem("fail")

window.location.href="https://lin.ee/lGGma6p"

}else{

fail++
localStorage.setItem("fail",fail)

let lockTime=0

if(fail>=9){
lockTime=180
}else if(fail>=6){
lockTime=90
}else if(fail>=3){
lockTime=30
}

if(lockTime>0){

lockUntil=Date.now()+lockTime*1000
localStorage.setItem("lockUntil",lockUntil)

}

document.getElementById("msg").innerText="Invalid credentials"

updateLock()

}

}

updateLock()

</script>

</body>
</html>
