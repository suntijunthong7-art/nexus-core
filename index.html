<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบควบคุมสิทธิ์การเข้าใช้งาน</title>

<style>
body{
    margin:0;
    font-family: sans-serif;
    background:#eef1f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    width:350px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 8px 25px rgba(0,0,0,0.1);
    text-align:center;
}

.logo{
    font-size:60px;
    margin-bottom:10px;
}

h2{
    margin:5px 0;
}

.subtitle{
    color:gray;
    font-size:14px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#2f4550;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:disabled{
    background:gray;
    cursor:not-allowed;
}

.message{
    margin-top:10px;
    font-size:14px;
}

.footer{
    margin-top:15px;
    font-size:12px;
    color:#888;
}
</style>
</head>
<body>

<div class="card">
    <div class="logo">🔒</div>
    <h2>ระบบตรวจสอบสิทธิ์การเข้าใช้งาน</h2>
    <div class="subtitle">Access Control System</div>

    <form id="loginForm">
        <input type="text" id="card" placeholder="รหัสประจำตัวเจ้าหน้าที่" required>
        <input type="password" id="pass" placeholder="รหัสผ่าน" required>
        <button type="submit" id="loginBtn">เข้าสู่ระบบ</button>
        <div id="messageBox" class="message"></div>
    </form>

    <div class="footer">
        การเข้าใช้งานโดยไม่ได้รับอนุญาต อาจมีความผิดตามกฎหมาย
    </div>
</div>

<script>
const correctCard = "LC-A01";
const correctPass = "Lc1993♧";

let failCount = parseInt(localStorage.getItem("failCount")) || 0;
let lockUntil = parseInt(localStorage.getItem("lockUntil")) || 0;

const form = document.getElementById("loginForm");
const messageBox = document.getElementById("messageBox");
const loginBtn = document.getElementById("loginBtn");

function showMessage(text,color="red"){
    messageBox.innerText = text;
    messageBox.style.color = color;
}

function checkLock(){
    const now = Date.now();

    if(lockUntil > now){
        const secondsLeft = Math.ceil((lockUntil - now)/1000);
        loginBtn.disabled = true;
        showMessage("ระบบถูกล็อก กรุณารอ " + secondsLeft + " วินาที", "red");
        setTimeout(checkLock,1000);
        return true;
    }else{
        loginBtn.disabled = false;
        return false;
    }
}

function setLockTime(){
    let lockTime = 0;

    if(failCount >= 9){
        lockTime = 5 * 60 * 1000;
    }else if(failCount >= 6){
        lockTime = 60 * 1000;
    }else if(failCount >= 3){
        lockTime = 30 * 1000;
    }

    if(lockTime > 0){
        lockUntil = Date.now() + lockTime;
        localStorage.setItem("lockUntil", lockUntil);
    }
}

form.addEventListener("submit",function(e){
    e.preventDefault();

    if(checkLock()) return;

    const card = document.getElementById("card").value.trim();
    const pass = document.getElementById("pass").value.trim();

    loginBtn.disabled = true;

    setTimeout(()=>{

        if(card === correctCard && pass === correctPass){
            failCount = 0;
            localStorage.removeItem("failCount");
            localStorage.removeItem("lockUntil");
            showMessage("เข้าสู่ระบบสำเร็จ","green");

            setTimeout(()=>{
                window.location.href="dashboard.html";
            },1000);

        }else{
            failCount++;
            localStorage.setItem("failCount",failCount);
            setLockTime();
            showMessage("รหัสไม่ถูกต้อง ครั้งที่ "+failCount,"red");
            loginBtn.disabled = false;
            checkLock();
        }

    },800);
});

checkLock();
</script>

</body>
</html>
