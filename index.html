<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Control System</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

html,body{
    margin:0;
    height:100%;
    font-family:'Sarabun',sans-serif;
    background:#e2e6ea;
    color:#2b2b2b;
}

.wrapper{
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* HEADER */
.header{
    background:#24343d;
    color:#fff;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
}

/* MAIN */
.main{
    flex:1;
    display:flex;
    justify-content:center;
    padding:30px 16px 10px 16px;
}

.panel{
    width:100%;
    max-width:500px;
    background:#ffffff;
    border:1px solid #4a5861;
    padding:30px 26px 24px 26px;
}

/* LOGO */
.logo{
    width:60px;
    display:block;
    margin:0 auto 16px auto;
    opacity:0.9;              /* ลดความเด่น */
}

/* TITLES */
h1{
    text-align:center;
    font-size:17px;
    margin:0;
    font-weight:600;
}

.subtitle{
    text-align:center;
    font-size:13px;
    margin:4px 0 18px 0;
    color:#555;
}

/* INPUT */
input{
    width:100%;
    padding:9px 10px;
    margin-bottom:10px;
    border:1px solid #666;
    font-size:14px;
    background:#f7f7f7;
    transition:.15s;
}

input:focus{
    outline:none;
    border-color:#2b2b2b;
    background:#fff;
}

/* BUTTON */
button{
    width:100%;
    padding:10px;
    background:#2c3e47;
    color:#fff;
    border:none;
    font-size:14px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#22313a;
}

/* NOTICE */
.notice{
    margin-top:16px;
    font-size:12px;
    border-top:1px solid #d0d0d0;
    padding-top:10px;
    line-height:1.5;
    color:#444;
}

/* FOOTER */
.footer{
    text-align:center;
    font-size:11px;
    padding:10px;
    background:#f1f3f5;
    border-top:1px solid #c4c8cc;
    color:#555;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
    <div>ศูนย์ควบคุมสิทธิ์การเข้าถึง</div>
    <div id="datetime"></div>
</div>

<div class="main">
<div class="panel">

<img src="logo.png" class="logo" alt="logo">

<h1>ระบบตรวจสอบสิทธิการเข้าใช้งาน</h1>
<div class="subtitle">Access Control System</div>

<input type="text" placeholder="รหัสประจำตัวเจ้าหน้าที่">
<input type="password" placeholder="รหัสผ่าน">

<button>เข้าสู่ระบบ</button>

<div class="notice">
การเข้าถึงโดยไม่ได้รับอนุญาต อาจมีความผิดตามกฎหมายที่เกี่ยวข้อง
</div>

</div>
</div>

<div class="footer">
© 2569 หน่วยงานกลางด้านความมั่นคงสารสนเทศ | เวอร์ชันระบบ 1.0.3
</div>

</div>

<script>
function updateTime(){
    const now=new Date();
    document.getElementById("datetime").innerText=
        now.toLocaleDateString("th-TH")+" "+
        now.toLocaleTimeString("th-TH");
}
setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
