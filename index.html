<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core | Secure Access</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#ffffff;
  width:100%;
  max-width:360px;
  padding:40px 30px;
  border-radius:8px;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
  text-align:center;
}

.logo{
  width:90px;
  margin-bottom:15px;
}

.company{
  font-size:13px;
  letter-spacing:2px;
  color:#6b7280;
  margin-bottom:5px;
}

h1{
  font-size:18px;
  margin:0 0 25px 0;
  color:#1f2937;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #d1d5db;
  border-radius:6px;
  font-size:14px;
  background:#fff;
}

input:focus{
  outline:none;
  border:1px solid #2563eb;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#1f2937;
  color:#ffffff;
  font-weight:600;
  cursor:pointer;
}

button:disabled{
  background:#9ca3af;
  cursor:not-allowed;
}

.message{
  font-size:13px;
  margin-top:10px;
}

.footer{
  margin-top:25px;
  font-size:11px;
  color:#6b7280;
}
</style>
</head>

<body>

<div class="container">

  <img src="logo.png" class="logo" alt="Logo">

  <div class="company">NEXUS CORE SYSTEM</div>
  <h1>Secure Access Portal</h1>

  <input type="text" id="user" placeholder="User ID">
  <input type="password" id="pass" placeholder="Password">

  <button onclick="login()" id="loginBtn">SIGN IN</button>

  <div class="message" id="message"></div>

  <div class="footer">
    © 2025 Nexus Core. All rights reserved.
  </div>

</div>

<script>
const correctUser = "admin";
const correctPass = "Lc1993♧";

let attempts = 0;
let locked = false;

function login(){
  if(locked) return;

  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;
  const message = document.getElementById("message");

  if(user === correctUser && pass === correctPass){
    message.style.color = "green";
    message.innerText = "Access Granted";
    attempts = 0;
  }else{
    attempts++;
    message.style.color = "red";
    message.innerText = "Invalid credentials ("+attempts+"/9)";

    if(attempts === 3 || attempts === 6){
      lockSystem(15);
    }

    if(attempts >= 9){
      lockSystem(30);
    }
  }
}

function lockSystem(seconds){
  locked = true;
  const btn = document.getElementById("loginBtn");
  const message = document.getElementById("message");
  btn.disabled = true;

  let timeLeft = seconds;
  message.innerText = "System locked. Try again in "+timeLeft+"s";

  const countdown = setInterval(()=>{
    timeLeft--;
    message.innerText = "System locked. Try again in "+timeLeft+"s";

    if(timeLeft <= 0){
      clearInterval(countdown);
      locked = false;
      btn.disabled = false;
      attempts = 0;
      message.innerText = "";
    }
  },1000);
}
</script>

</body>
</html>
