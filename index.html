<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<style>

body{
font-family: Inter, Roboto, Arial, sans-serif;
background: linear-gradient(180deg,#0a3a4a,#072f3c);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.card{
background:#fff;
width:340px;
padding:40px;
border-radius:14px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
text-align:center;
}

.logo{
width:70px;
margin-bottom:10px;
}

h1{
font-size:20px;
margin:6px 0;
color:#333;
letter-spacing:1px;
}

.sub{
color:#555;
font-size:14px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1.4px solid #cfd4da;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
background:#2f3f56;
color:white;
font-weight:600;
cursor:pointer;
}

button:disabled{
background:#9ca3af;
cursor:not-allowed;
}

.msg{
margin-top:12px;
font-size:14px;
}

.lock{
color:#c0392b;
}

.footer{
font-size:11px;
color:#777;
margin-top:18px;
}

</style>
</head>

<body>

<div class="card">

<img class="logo" src="logo.png">

<h1>NEXUS CORE SYSTEM</h1>
<div class="sub">Secure Access Portal</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn">SIGN IN</button>

<div id="msg" class="msg"></div>

<div class="footer">
Authorized personnel only. All access is logged and monitored.<br><br>
© 2025 Nexus Core Systems<br>
Internal Access Gateway v2.4.1
</div>

</div>

<script>

const correctUser="admin";
const correctPass="1234";
const redirectURL="https://lin.ee/lGGma6p";

let fail=Number(localStorage.getItem("fail"))||0;
let lockUntil=Number(localStorage.getItem("lockUntil"))||0;

const btn=document.getElementById("loginBtn");
const msg=document.getElementById("msg");

function checkLock(){

let now=Date.now();

if(lockUntil>now){

btn.disabled=true;

let sec=Math.ceil((lockUntil-now)/1000);

msg.innerHTML="Security Lock Active — Retry in "+sec+"s";
msg.className="msg lock";

}else{

btn.disabled=false;
msg.innerHTML="";

}

}

setInterval(checkLock,500);

btn.onclick=function(){

let now=Date.now();

if(lockUntil>now) return;

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u===correctUser && p===correctPass){

localStorage.removeItem("fail");
localStorage.removeItem("lockUntil");

window.location.href=redirectURL;

}else{

fail++;
localStorage.setItem("fail",fail);

let lockTime=0;

if(fail>=9) lockTime=180;
else if(fail>=6) lockTime=90;
else if(fail>=3) lockTime=30;

if(lockTime>0){

lockUntil=Date.now()+lockTime*1000;
localStorage.setItem("lockUntil",lockUntil);

}

msg.innerHTML="Invalid credentials";
msg.className="msg lock";

}

};

document.addEventListener("keydown",function(e){
if(e.key==="Enter") btn.click();
});

checkLock();

</script>

</body>
</html>
