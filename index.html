<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial,Helvetica,sans-serif;

background:linear-gradient(135deg,#0c3b47,#0b2e3a);
}

.card{

background:#f4f4f4;
width:340px;
padding:35px;
border-radius:20px;
text-align:center;

box-shadow:
0 20px 40px rgba(0,0,0,0.3);
}

.logo{
width:70px;
margin-bottom:10px;
}

h1{
font-size:22px;
letter-spacing:2px;
margin:5px 0;
}

.subtitle{
font-size:14px;
color:#555;
margin-bottom:25px;
}

input{

width:100%;
padding:12px;
margin:10px 0;

border-radius:10px;
border:1px solid #ccc;

font-size:14px;
}

button{

width:100%;
padding:13px;

border:none;
border-radius:10px;

background:#2e3f55;
color:white;

font-size:15px;
font-weight:bold;

cursor:pointer;

transition:0.2s;
}

button:hover{
background:#1e2d3f;
}

button:disabled{

background:#9aa3af;
cursor:not-allowed;
}

.lock{
margin-top:15px;
color:#d52c2c;
font-size:14px;
}

.footer{
margin-top:20px;
font-size:12px;
color:#777;
}

</style>
</head>


<body>

<div class="card">

<img src="logo.png" class="logo">

<h1>NEXUS CORE SYSTEM</h1>
<div class="subtitle">Secure Access Portal</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div id="lockMsg" class="lock"></div>

<div class="footer">
Authorized personnel only. Unauthorized access is strictly prohibited and monitored.<br><br>
© 2025 Nexus Core Systems<br>
Internal Access Gateway v2.4.1
</div>

</div>

<script>

let attempts=0
let lockTimes=[30,90,180]
let locked=false

function login(){

if(locked)return

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u==="admin" && p==="1234"){

alert("ACCESS GRANTED")

}else{

attempts++

if(attempts<=3){

let time=lockTimes[attempts-1]

lock(time)

}else{

lock(180)

}

}

}

function lock(seconds){

locked=true

let btn=document.getElementById("loginBtn")
let msg=document.getElementById("lockMsg")

btn.disabled=true

let t=seconds

msg.innerHTML="Security Lock Active — Retry in "+t+"s"

let timer=setInterval(()=>{

t--

msg.innerHTML="Security Lock Active — Retry in "+t+"s"

if(t<=0){

clearInterval(timer)

locked=false

btn.disabled=false

msg.innerHTML=""

}

},1000)

}

</script>

</body>
</html>
