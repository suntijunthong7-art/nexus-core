<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core | Secure Access</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#fff;
  width:100%;
  max-width:360px;
  padding:40px 30px;
  border-radius:8px;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
  text-align:center;
}

.logo{
  width:90px;
  margin-bottom:15px;
}

.company{
  font-size:13px;
  letter-spacing:2px;
  color:#6b7280;
}

h1{
  font-size:18px;
  margin:5px 0 25px;
  color:#1f2937;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #d1d5db;
  border-radius:6px;
  font-size:14px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#1f2937;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

button:disabled{
  background:#9ca3af;
  cursor:not-allowed;
}

.message{
  margin-top:10px;
  font-size:13px;
  color:#dc2626;
}

.footer{
  margin-top:25px;
  font-size:11px;
  color:#6b7280;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo" alt="Logo">

<div class="company">NEXUS CORE SYSTEM</div>
<h1>Secure Access Portal</h1>

<input type="text" id="user" placeholder="User ID">
<input type="password" id="pass" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div class="message" id="msg"></div>

<div class="footer">
© 2025 Nexus Core. All rights reserved.
</div>

</div>

<script>

const correctUser="admin";
const correctPass="1234";

let attempts = parseInt(localStorage.getItem("attempts")) || 0;
let lockUntil = parseInt(localStorage.getItem("lockUntil")) || 0;

const btn = document.getElementById("loginBtn");
const msg = document.getElementById("msg");

checkLock();

function login(){

  if(Date.now() < lockUntil){
    return;
  }

  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if(user === correctUser && pass === correctPass){
    msg.style.color="green";
    msg.innerText="Access Granted";
    attempts = 0;
    localStorage.removeItem("attempts");
    localStorage.removeItem("lockUntil");
  }else{
    attempts++;
    localStorage.setItem("attempts", attempts);
    msg.style.color="red";
    msg.innerText="Invalid credentials";

    if(attempts===3){
      lockAccount(30);
    }else if(attempts===6){
      lockAccount(90);
    }else if(attempts===9){
      lockAccount(180);
    }
  }
}

function lockAccount(seconds){
  lockUntil = Date.now() + seconds*1000;
  localStorage.setItem("lockUntil", lockUntil);
  startCountdown(seconds);
}

function startCountdown(seconds){
  btn.disabled = true;
  let remaining = seconds;

  msg.innerText="Account locked: "+remaining+"s";

  const timer = setInterval(()=>{
    remaining--;
    msg.innerText="Account locked: "+remaining+"s";
    if(remaining<=0){
      clearInterval(timer);
      btn.disabled=false;
      msg.innerText="";
      attempts=0;
      localStorage.removeItem("attempts");
      localStorage.removeItem("lockUntil");
    }
  },1000);
}

function checkLock(){
  if(Date.now() < lockUntil){
    const remaining = Math.ceil((lockUntil - Date.now())/1000);
    startCountdown(remaining);
  }
}

</script>

</body>
</html>
