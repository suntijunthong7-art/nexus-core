<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#083b45,#0e5b63);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:white;
padding:30px;
border-radius:14px;
width:320px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo{
width:95px;
height:95px;
margin-bottom:15px;
}

h2{
margin:5px 0;
font-size:22px;
}

p{
color:#666;
font-size:14px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#2f4156;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#223244;
}

#msg{
margin-top:10px;
font-size:14px;
color:red;
}

</style>
</head>

<body>

<div class="login-box">

<img src="logo.png" class="logo">

<h2>NEXUS CORE SYSTEM</h2>
<p>Secure Access Portal</p>

<input type="text" id="user" placeholder="User ID">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">SIGN IN</button>

<div id="msg"></div>

</div>

<script>

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u==="admin" && p==="1234"){

window.location.href="https://lin.ee/lGGma6p"

}else{

document.getElementById("msg").innerText="Invalid access credentials"

}

}

</script>

</body>
</html>
