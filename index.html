<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXUS CORE | OMEGA GATEWAY</title>
<style>
/* MATTE BLACK & GOLD ARCHITECTURE V2.0 */
body {
    font-family: 'Courier New', Courier, monospace;
    background: #050505;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    overflow: hidden;
    color: #d4af37;
}

.card {
    background: linear-gradient(145deg, #0d0d0d, #141414);
    padding: 40px 30px;
    width: 320px;
    border-radius: 8px;
    border: 1px solid rgba(212, 175, 55, 0.2);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), inset 0 0 15px rgba(212, 175, 55, 0.05);
    text-align: center;
    position: relative;
}

/* Scanline Effect */
.card::before {
    content: " ";
    display: block;
    position: absolute;
    top: 0; left: 0; bottom: 0; right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
    z-index: 2;
    background-size: 100% 2px, 3px 100%;
    pointer-events: none;
    opacity: 0.3;
}

.logo-container {
    margin-bottom: 20px;
    position: relative;
    z-index: 3;
}

.logo-svg {
    width: 80px;
    height: 80px;
    filter: drop-shadow(0px 0px 5px rgba(212, 175, 55, 0.4));
}

.title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #d4af37;
    margin-bottom: 5px;
    position: relative;
    z-index: 3;
}

.subtitle {
    color: #666;
    font-size: 11px;
    letter-spacing: 3px;
    margin-bottom: 25px;
    position: relative;
    z-index: 3;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 4px;
    border: 1px solid #333;
    background: #080808;
    color: #d4af37;
    font-size: 14px;
    font-family: 'Courier New', Courier, monospace;
    box-sizing: border-box;
    letter-spacing: 2px;
    text-align: center;
    transition: all 0.3s;
    position: relative;
    z-index: 3;
}

input:focus {
    outline: none;
    border-color: #d4af37;
    box-shadow: 0 0 10px rgba(212, 175, 55, 0.15);
}

input::placeholder {
    color: #444;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 25px;
    border: 1px solid #d4af37;
    border-radius: 4px;
    background: transparent;
    color: #d4af37;
    font-weight: bold;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: 'Courier New', Courier, monospace;
    text-transform: uppercase;
    position: relative;
    z-index: 3;
}

button:hover:not(:disabled) {
    background: rgba(212, 175, 55, 0.1);
    box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
}

button:disabled {
    border-color: #333;
    color: #555;
    cursor: not-allowed;
}

#message {
    margin-top: 20px;
    font-size: 12px;
    color: #d4af37;
    min-height: 20px;
    letter-spacing: 1px;
    font-weight: bold;
    position: relative;
    z-index: 3;
}

.footer {
    font-size: 9px;
    margin-top: 35px;
    color: #444;
    letter-spacing: 1.5px;
    line-height: 1.6;
    position: relative;
    z-index: 3;
}
</style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <polygon points="50,5 95,50 50,95 5,50" fill="none" stroke="#d4af37" stroke-width="2"/>
            <polygon points="50,15 85,50 50,85 15,50" fill="none" stroke="#d4af37" stroke-width="1" stroke-dasharray="4,4"/>
            <path d="M 35 35 L 65 35 L 50 65 Z" fill="none" stroke="#d4af37" stroke-width="1.5"/>
            <circle cx="50" cy="50" r="3" fill="#d4af37"/>
        </svg>
    </div>

    <div class="title">NEXUS CORE</div>
    <div class="subtitle">OMEGA LEVEL CLEARANCE</div>

    <input id="user" placeholder="AUTHORIZATION ID" autocomplete="off" spellcheck="false">
    <input id="pass" type="password" placeholder="PASSCODE">

    <button id="loginBtn" onclick="initiateLink()">AUTHENTICATE</button>

    <div id="message"></div>

    <div class="footer">
        AUTHORIZED PERSONNEL ONLY<br>
        TRACKED VIA SATELLITE NETWORK<br><br>
        © 2026 NEXUS CORE
    </div>
</div>

<script>
// ==========================================
// NEXUS CORE: ENHANCED PROTOCOL V2.0
// ==========================================

// Credentials converted to Base64 
const AUTH_U = "YWRtaW4="; // ID
const AUTH_P = "MTIzNA=="; // PASS
const DESTINATION = "https://lin.ee/lGGma6p";

let attempts = parseInt(localStorage.getItem("nc_attempts")) || 0;
let lockUntil = parseInt(localStorage.getItem("nc_lock")) || 0;

const msg = document.getElementById("message");
const btn = document.getElementById("loginBtn");
const user = document.getElementById("user");
const pass = document.getElementById("pass");

// Typewriter Effect
function typeWriter(text, element, speed = 30) {
    element.innerHTML = "";
    let i = 0;
    function type() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, speed);
        }
    }
    type();
}

function initiateLink() {
    let now = Date.now();
    if (now < lockUntil) {
        startCountdown();
        return;
    }

    // Convert input to Base64 for matching
    let u_input = btoa(user.value);
    let p_input = btoa(pass.value);

    if (u_input === AUTH_U && p_input === AUTH_P) {
        localStorage.removeItem("nc_attempts");
        localStorage.removeItem("nc_lock");
        
        msg.style.color = "#d4af37";
        typeWriter("[ ✓ ] CLEARANCE ACCEPTED. ESTABLISHING LINK...", msg, 20);
        
        setTimeout(() => {
            window.location.href = DESTINATION;
        }, 1500);
        return;
    }

    attempts++;
    localStorage.setItem("nc_attempts", attempts);

    let lockTime = 0;
    if (attempts >= 9) lockTime = 180000;
    else if (attempts >= 6) lockTime = 90000;
    else if (attempts >= 3) lockTime = 30000;

    if (lockTime > 0) {
        lockUntil = Date.now() + lockTime;
        localStorage.setItem("nc_lock", lockUntil);
        startCountdown();
    } else {
        msg.style.color = "#e74c3c";
        typeWriter("[ ✕ ] ACCESS DENIED (" + attempts + ")", msg, 20);
        user.value = "";
        pass.value = "";
    }
}

function startCountdown() {
    btn.disabled = true;
    user.disabled = true;
    pass.disabled = true;
    user.value = "";
    pass.value = "";
    
    msg.style.color = "#e74c3c";

    let timer = setInterval(() => {
        let remaining = Math.ceil((lockUntil - Date.now()) / 1000);
        if (remaining <= 0) {
            clearInterval(timer);
            btn.disabled = false;
            user.disabled = false;
            pass.disabled = false;
            msg.innerText = "";
            localStorage.removeItem("nc_lock");
            return;
        }
        msg.innerText = "SYSTEM LOCKED. RETRY IN: " + remaining + "s";
    }, 1000);
}

function checkStatus() {
    if (Date.now() < lockUntil) {
        startCountdown();
    }
}

window.onload = checkStatus;
</script>

</body>
</html>
