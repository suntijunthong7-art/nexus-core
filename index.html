<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE :: Secure Access</title>

<style>
:root{
    --bg1:#0a1a2b;
    --bg2:#0e2a47;
    --panel:#0f2238;
    --accent:#c9a227;
    --line:#1e3a5f;
}

*{box-sizing:border-box}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    font-family:Segoe UI, Arial, sans-serif;
    color:#e6e6e6;
}

.container{
    width:360px;
    background:var(--panel);
    padding:38px 32px;
    border-radius:12px;
    border-top:3px solid var(--accent);
    box-shadow:0 0 50px rgba(0,0,0,.65);
    text-align:center;
}

.logo{
    width:64px;
    margin-bottom:14px;
}

h1{
    margin:6px 0 4px;
    font-size:20px;
    letter-spacing:3px;
    font-weight:600;
}

.sub{
    font-size:12px;
    color:#9fb3c8;
    margin-bottom:6px;
}

.meta{
    font-size:10px;
    color:#6f8aa5;
    margin-bottom:22px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:14px;
    background:#081625;
    border:1px solid var(--line);
    border-radius:6px;
    color:white;
    font-size:13px;
}

input:focus{
    outline:none;
    border-color:var(--accent);
}

button{
    width:100%;
    padding:12px;
    background:var(--accent);
    border:none;
    border-radius:6px;
    font-weight:600;
    cursor:pointer;
    color:#111;
}

button:hover{
    opacity:.9;
}

.footer{
    margin-top:18px;
    font-size:9px;
    color:#556b82;
    line-height:1.4;
}
</style>
</head>

<body>

<div class="container">
    <img src="logo.png" class="logo">

    <h1>NEXUS CORE</h1>
    <div class="sub">Internal Secure Access Portal</div>
    <div class="meta">Build 2.4.7 • ENV: Production • Node-TH-01</div>

    <input id="username" type="text" placeholder="Agent ID">
    <input id="password" type="password" placeholder="Access Key">

    <button onclick="login()">AUTHORIZED ACCESS</button>

    <div class="footer">
        Restricted system. Unauthorized access is monitored and logged.<br>
        Session Ref: NC-SEC-48291
    </div>
</div>

<script>
let attempts = 0;

function login(){

    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();

    const correctUser = "operator";
    const correctPass = "2026";

    if(user === correctUser && pass === correctPass){
        window.location.href = "https://lin.ee/xbIaU45";
    } else {
        attempts++;

        if(attempts >= 3){
            document.body.innerHTML = `
            <div style="
                background:#000;
                color:#ff2e2e;
                height:100vh;
                display:flex;
                justify-content:center;
                align-items:center;
                flex-direction:column;
                font-family:monospace;
                text-align:center;
            ">
                <h2>SECURITY LOCKDOWN INITIATED</h2>
                <p>Multiple unauthorized attempts detected.</p>
                <p>Access temporarily suspended.</p>
                <p style="color:#666;font-size:11px;margin-top:15px;">
                Incident Code: NC-ALERT-9031
                </p>
            </div>
            `;
        } else {
            alert("Invalid credentials (" + attempts + "/3)");
        }
    }
}
</script>

</body>
</html>
