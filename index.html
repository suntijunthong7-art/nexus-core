<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#0b2a36,#0f4c5c);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.card{
background:#fff;
padding:40px;
width:340px;
border-radius:16px;
box-shadow:0 15px 35px rgba(0,0,0,0.35);
text-align:center;
}

.logo{
width:90px;
margin-bottom:18px;
}

.title{
font-size:20px;
font-weight:bold;
letter-spacing:2px;
}

.subtitle{
color:#666;
font-size:14px;
margin-bottom:22px;
}

input{
width:100%;
padding:11px;
margin:7px 0;
border-radius:7px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:7px;
background:#2e3f55;
color:white;
font-weight:bold;
letter-spacing:1px;
cursor:pointer;
}

button:disabled{
background:#9aa3ad;
cursor:not-allowed;
}

#message{
margin-top:12px;
font-size:13px;
color:#d11;
min-height:18px;
}

.footer{
font-size:11px;
margin-top:18px;
color:#777;
}

</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<div class="title">NEXUS CORE SYSTEM</div>
<div class="subtitle">Secure Access Portal</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div id="message"></div>

<div class="footer">
Authorized personnel only. All access is logged and monitored.<br>
© 2025 Nexus Core Systems
</div>

</div>

<script>

const ADMIN_ID="admin"
const ADMIN_PASS="1234"
const LINE_URL="https://lin.ee/lGGma6p"

let attempts=parseInt(localStorage.getItem("attempts"))||0
let lockUntil=parseInt(localStorage.getItem("lockUntil"))||0

const msg=document.getElementById("message")
const btn=document.getElementById("loginBtn")
const user=document.getElementById("user")
const pass=document.getElementById("pass")

function login(){

let now=Date.now()

if(now<lockUntil){
startCountdown()
return
}

let u=user.value
let p=pass.value

if(u===ADMIN_ID && p===ADMIN_PASS){

localStorage.removeItem("attempts")
localStorage.removeItem("lockUntil")

window.location.href=LINE_URL
return
}

attempts++
localStorage.setItem("attempts",attempts)

let lockTime=0

if(attempts>=9) lockTime=180000
else if(attempts>=6) lockTime=90000
else if(attempts>=3) lockTime=30000

if(lockTime>0){

lockUntil=Date.now()+lockTime
localStorage.setItem("lockUntil",lockUntil)

startCountdown()

}else{

msg.innerText="Invalid credentials ("+attempts+")"

}

}

function startCountdown(){

btn.disabled=true
user.disabled=true
pass.disabled=true

let timer=setInterval(()=>{

let remaining=Math.ceil((lockUntil-Date.now())/1000)

if(remaining<=0){

clearInterval(timer)

btn.disabled=false
user.disabled=false
pass.disabled=false

msg.innerText=""

localStorage.removeItem("lockUntil")

return
}

msg.innerText="Security Lock Active — Retry in "+remaining+"s"

},1000)

}

function checkLock(){

if(Date.now()<lockUntil){
startCountdown()
}

}

checkLock()

</script>

</body>
</html>
