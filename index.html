<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core | Internal Access</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#ffffff;
  width:100%;
  max-width:360px;
  padding:40px 30px;
  border-radius:8px;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
  text-align:center;
}

.logo{
  width:90px;
  margin-bottom:12px;
}

.company{
  font-size:12px;
  letter-spacing:2px;
  color:#6b7280;
  margin-bottom:4px;
}

h1{
  font-size:18px;
  margin:0 0 25px 0;
  color:#1f2937;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #d1d5db;
  border-radius:6px;
  font-size:14px;
  background:#ffffff;
}

input:focus{
  outline:none;
  border:1px solid #1f2937;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#1f2937;
  color:#ffffff;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  background:#111827;
}

.footer{
  margin-top:25px;
  font-size:11px;
  color:#6b7280;
}
</style>
</head>

<body>

<div class="container">

  <img src="logo.png" class="logo" alt="Nexus Core Logo">

  <div class="company">NEXUS CORE SYSTEM</div>
  <h1>Internal Access Portal</h1>

  <input type="text" placeholder="Employee ID">
  <input type="password" placeholder="Password">

  <button>SIGN IN</button>

  <div class="footer">
    © 2025 Nexus Core System · Internal Use Only
  </div>

</div>

</body>
</html>
