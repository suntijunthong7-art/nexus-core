<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core Secure Portal</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#071a1f,#0f2b35,#1e3f52);
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:35px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.logo{
width:90px;
margin-bottom:15px;
}

h3{
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
background:#2e3f55;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#162333;
}

.footer{
font-size:11px;
color:#777;
margin-top:20px;
}

.status{
font-size:11px;
color:#3a8f5e;
margin-top:10px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:25px;
border-radius:10px;
width:260px;
text-align:center;
}

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#071a1f;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
z-index:999;
}
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
background:#2e3f55;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
transition:0.3s;
box-shadow:0 4px 10px rgba(0,0,0,.3);
}

button:hover{
background:#162333;
transform:scale(1.05);
box-shadow:0 0 12px #3fa9f5;
}
</style>

</head>

<body>

<div class="loading" id="loading">
Initializing Secure Portal...
</div>

<div class="container">

<img src="logo.png" class="logo">

<h3>Nexus Core Secure Portal</h3>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">SIGN IN</button>

<div class="status">
System Status : Secure Connection Active
</div>

<div class="footer">
Unauthorized access is prohibited<br>
All activity is logged and monitored<br>
© Nexus Core Systems
</div>

</div>


<div class="modal" id="modal">
<div class="modal-box">

<h3>ACCESS DENIED</h3>
<p id="msg">Invalid credentials detected</p>

<button onclick="closeModal()">DISMISS</button>

</div>
</div>


<script>

setTimeout(()=>{
document.getElementById("loading").style.display="none";
},1200);

let locked=false;

function login(){

if(locked)return;

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="admin" && p==="1234"){

window.location.href="https://lin.ee/lGGma6p";

}else{

document.getElementById("modal").style.display="flex";

locked=true;

let sec=30;

document.getElementById("msg").innerText="Security lock engaged : "+sec+"s";

let timer=setInterval(()=>{

sec--;

document.getElementById("msg").innerText="Security lock engaged : "+sec+"s";

if(sec<=0){

clearInterval(timer);

locked=false;

document.getElementById("msg").innerText="Invalid credentials detected";

}

},1000);

}

}

function closeModal(){
document.getElementById("modal").style.display="none";
}

document.addEventListener("contextmenu",event=>event.preventDefault());

document.onkeydown=function(e){

if(e.keyCode==123) return false;

if(e.ctrlKey && e.shiftKey && e.keyCode==73) return false;

if(e.ctrlKey && e.keyCode==85) return false;

};

</script>

</body>
</html>
