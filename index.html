<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core | Internal Access</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#ffffff;
  width:100%;
  max-width:360px;
  padding:40px 30px;
  border-radius:8px;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
  text-align:center;
}

.company{
  font-size:12px;
  letter-spacing:2px;
  color:#6b7280;
  margin-bottom:4px;
}

h1{
  font-size:18px;
  margin:0 0 25px 0;
  color:#1f2937;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #d1d5db;
  border-radius:6px;
  font-size:14px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#1f2937;
  color:#ffffff;
  font-weight:600;
  cursor:pointer;
}

button:disabled{
  background:#9ca3af;
  cursor:not-allowed;
}

.error{
  color:#dc2626;
  font-size:13px;
  margin-bottom:10px;
  min-height:18px;
}

.footer{
  margin-top:25px;
  font-size:11px;
  color:#4b5563;
}
</style>
</head>

<body>

<div class="container">

  <div class="company">NEXUS CORE SYSTEM</div>
  <h1>Internal Access Portal</h1>

  <div class="error" id="errorMsg"></div>

  <input type="text" id="user" placeholder="Employee ID">
  <input type="password" id="pass" placeholder="Password">

  <button onclick="login()" id="loginBtn">SIGN IN</button>

  <div class="footer">
    © 2025 Nexus Core System · Internal Use Only
  </div>

</div>

<script>
let attempts = 0;
let locked = false;

function login(){

  if(locked) return;

  const user = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value.trim();
  const error = document.getElementById("errorMsg");
  const btn = document.getElementById("loginBtn");

  if(!user || !pass){
    error.innerText = "Please enter Employee ID and Password.";
    return;
  }

  btn.innerText = "Authenticating...";
  btn.disabled = true;

  setTimeout(() => {

    if(user === "admin" && pass === "1234"){
      error.style.color = "green";
      error.innerText = "Access Granted.";
      setTimeout(()=>{ window.location.href="dashboard.html"; },1000);
    } else {
      attempts++;
      error.style.color = "#dc2626";
      error.innerText = "Invalid credentials. Attempt " + attempts + " of 3.";

      if(attempts >= 3){
        lockSystem();
      }
    }

    btn.innerText = "SIGN IN";
    btn.disabled = false;

  },1000);
}

function lockSystem(){
  locked = true;
  const error = document.getElementById("errorMsg");
  const btn = document.getElementById("loginBtn");

  let countdown = 15;
  btn.disabled = true;

  const interval = setInterval(() => {
    error.innerText = "Too many failed attempts. Try again in " + countdown + " seconds.";
    countdown--;

    if(countdown < 0){
      clearInterval(interval);
      attempts = 0;
      locked = false;
      error.innerText = "";
      btn.disabled = false;
    }

  },1000);
}
</script>

</body>
</html>
