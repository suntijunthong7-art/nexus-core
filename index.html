<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Government Information System</title>

<style>
body{
    margin:0;
    background:#e6e6e6;
    font-family: Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#ffffff;
    width:95%;
    max-width:420px;
    padding:30px;
    border:1px solid #cfcfcf;
}

.header{
    font-size:16px;
    font-weight:bold;
    margin-bottom:5px;
}

.subheader{
    font-size:13px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #999;
    font-size:14px;
}

button{
    width:100%;
    padding:10px;
    background:#2d2d2d;
    color:#fff;
    border:none;
    font-size:14px;
    cursor:pointer;
}

button:disabled{
    background:#777;
    cursor:not-allowed;
}

.warning{
    font-size:12px;
    color:#b00000;
    margin-top:10px;
    min-height:16px;
}

.notice{
    font-size:11px;
    margin-top:20px;
    line-height:1.5;
}
</style>
</head>

<body>

<div class="container">
    <div class="header">U.S. GOVERNMENT INFORMATION SYSTEM</div>
    <div class="subheader">Authorized Use Only</div>

    <input type="password" id="password" placeholder="Enter Access Code">
    <button id="loginBtn" onclick="login()">Sign In</button>

    <div class="warning" id="warning"></div>

    <div class="notice">
        Unauthorized access is prohibited and subject to criminal penalties.
    </div>
</div>

<script>
let attempts = 0;
const correctPassword = "0000";
let lockTimer = null;

function login(){
    const input = document.getElementById("password");
    const warning = document.getElementById("warning");
    const btn = document.getElementById("loginBtn");

    if(btn.disabled) return;

    if(input.value === correctPassword){
        window.location.href = "https://lin.ee/xbIaU45";
        return;
    }

    attempts++;

    if(attempts >= 3){
        lockSystem();
    } else {
        warning.innerText = "Invalid access credentials. (" + attempts + "/3)";
    }

    input.value = "";
}

function lockSystem(){
    const btn = document.getElementById("loginBtn");
    const warning = document.getElementById("warning");

    let countdown = 30;
    btn.disabled = true;

    warning.innerText = "System locked. Try again in 30 seconds.";

    lockTimer = setInterval(() => {
        countdown--;
        warning.innerText = "System locked. Try again in " + countdown + " seconds.";

        if(countdown <= 0){
            clearInterval(lockTimer);
            attempts = 0;
            btn.disabled = false;
            warning.innerText = "";
        }
    }, 1000);
}
</script>

</body>
</html>
