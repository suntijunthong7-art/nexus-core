<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE - Secure Access</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0b1c2d;
    font-family:Segoe UI, Arial, sans-serif;
    color:#d9e2ec;
}

.container{
    background:#13293d;
    padding:35px;
    width:340px;
    border-radius:8px;
    box-shadow:0 0 25px rgba(0,0,0,0.6);
}

.logo{
    width:65px;
    display:block;
    margin:0 auto 15px auto;
}

h1{
    text-align:center;
    font-size:20px;
    letter-spacing:2px;
    margin:5px 0;
}

.subtitle{
    text-align:center;
    font-size:12px;
    color:#9fb3c8;
    margin-bottom:20px;
}

.meta{
    text-align:center;
    font-size:10px;
    color:#6b859c;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:14px;
    background:#0b1c2d;
    border:1px solid #1f3b55;
    color:white;
    border-radius:4px;
    font-size:13px;
}

button{
    width:100%;
    padding:11px;
    background:#1f3b55;
    border:none;
    color:white;
    font-weight:600;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#294e70;
}

.footer{
    text-align:center;
    font-size:9px;
    color:#5d7287;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">
    <img src="logo.png" class="logo">

    <h1>NEXUS CORE</h1>
    <div class="subtitle">Internal Secure Intelligence Portal</div>

    <div class="meta">
        Build 2.4.7 | Secure Node: TH-48291
    </div>

    <input id="username" type="text" placeholder="Agent ID">
    <input id="password" type="password" placeholder="Access Key">

    <button onclick="login()">AUTHENTICATE</button>

    <div class="footer">
        Unauthorized access is strictly prohibited and monitored.
    </div>
</div>

<script>
let attempts = 0;

function login(){

    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    const correctUser = "admin";
    const correctPass = "1234";

    if(user === correctUser && pass === correctPass){
        window.location.href = "https://lin.ee/xbIaU45";
    } else {
        attempts++;

        if(attempts >= 3){
            document.body.innerHTML = `
                <div style="
                    background:#000;
                    color:#ff4d4d;
                    height:100vh;
                    display:flex;
                    justify-content:center;
                    align-items:center;
                    flex-direction:column;
                    font-family:monospace;
                    text-align:center;
                ">
                    <h1>SECURITY LOCKDOWN</h1>
                    <p>Multiple unauthorized attempts detected.</p>
                    <p>Session Terminated.</p>
                </div>
            `;
        } else {
            alert("Authentication failed (" + attempts + "/3)");
        }
    }
}
</script>

</body>
</html>
