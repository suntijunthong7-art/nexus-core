<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core System</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(160deg,#0b2a3c,#082032);
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{
background:white;
width:360px;
padding:40px;
border-radius:18px;
box-shadow:0 20px 60px rgba(0,0,0,0.4);
text-align:center;
}

.logo{
width:70px;
margin-bottom:15px;
}

h3{
margin:5px;
color:#3c4a57;
letter-spacing:2px;
font-weight:600;
}

h1{
margin-top:5px;
font-size:22px;
color:#1f2a37;
}

input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:10px;
border:1px solid #d1d5db;
font-size:15px;
}

button{
width:100%;
margin-top:16px;
padding:14px;
background:#22354d;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
letter-spacing:1px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#1b2c40;
}

.notice{
margin-top:14px;
font-size:12px;
color:#6b7280;
}

.error{
color:red;
margin-top:10px;
font-size:13px;
}

.footer{
margin-top:16px;
font-size:11px;
color:#888;
}
</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h3>NEXUS CORE SYSTEM</h3>
<h1>Secure Access Portal</h1>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">SIGN IN</button>

<div class="error" id="msg"></div>

<div class="notice">
Authorized personnel only. All access is logged and monitored.
</div>

<div class="footer">
© 2025 Nexus Core <br>
System v2.4.1
</div>

</div>

<script>

const correctUser="admin"
const correctPass="1234"

let attempts=0
let lockTime=0

function login(){

const now=Date.now()

if(now < lockTime){
let remain=Math.ceil((lockTime-now)/1000)
document.getElementById("msg").innerText="Account locked. Try again in "+remain+"s"
return
}

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value

if(user===correctUser && pass===correctPass){

document.getElementById("msg").style.color="green"
document.getElementById("msg").innerText="Access granted"

setTimeout(()=>{
window.location.href="https://lin.ee/lGGma6p"
},1000)

}else{

attempts++

document.getElementById("msg").style.color="red"
document.getElementById("msg").innerText="Invalid credentials"

if(attempts==3){
lockTime=Date.now()+30000
}

if(attempts==6){
lockTime=Date.now()+90000
}

if(attempts>=9){
lockTime=Date.now()+180000
}

}

}

</script>

</body>
</html>
