<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#052c33,#0c4a54);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.card{
background: rgba(255,255,255,0.96);
padding:40px;
width:340px;
border-radius:20px;
box-shadow:0 25px 60px rgba(0,0,0,0.35);
text-align:center;
}

.logo{
width:85px;
margin-bottom:18px;
}

.title{
font-size:24px;
font-weight:bold;
letter-spacing:2px;
color:#2b2b2b;
}

.subtitle{
color:#6a6a6a;
font-size:14px;
margin-bottom:20px;
}

.systeminfo{
font-size:13px;
color:#8a8a8a;
line-height:1.6;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #dcdcdc;
font-size:14px;
}

button{
width:100%;
padding:13px;
margin-top:10px;
border:none;
border-radius:10px;
background:#3e516a;
color:white;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:#9aa3ad;
}

#message{
margin-top:10px;
font-size:13px;
color:red;
}

.status{
margin-top:18px;
font-size:13px;
color:#7a7a7a;
}

.footer{
margin-top:18px;
font-size:12px;
color:#8c8c8c;
}

</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<div class="title">NEXUS CORE SYSTEM</div>
<div class="subtitle">Secure Access Portal</div>

<div class="systeminfo">
SYSTEM ID: NX-CORE-771A<br>
SECURITY LEVEL: OMEGA<br>
NETWORK NODE: GLOBAL GRID
</div>

<input type="text" id="user" placeholder="User ID">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()" id="loginBtn">SIGN IN</button>

<div id="message"></div>

<div class="status">
SYSTEM STATUS: ONLINE<br>
ENCRYPTION: AES-256
</div>

<div class="footer">
WARNING: This system is restricted to authorized personnel only.<br>
All access is logged and monitored.<br>
© 2025 Nexus Core Systems
</div>

</div>

<script>

let attempts = 0
let lockTime = 20

function login(){

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value
let msg=document.getElementById("message")

if(user==="admin" && pass==="1234"){

msg.style.color="green"
msg.innerHTML="Access Granted..."

setTimeout(()=>{
window.location.href="https://lin.ee/lGGma6p"
},1200)

}else{

attempts++

if(attempts>=1){

lockSystem()

}else{

msg.innerHTML="Access Denied"

}

}

}

function lockSystem(){

let btn=document.getElementById("loginBtn")
let msg=document.getElementById("message")

btn.disabled=true

let time=lockTime

let timer=setInterval(()=>{

msg.innerHTML="System locked. Try again in "+time+" seconds"

time--

if(time<0){

clearInterval(timer)

btn.disabled=false

msg.innerHTML=""

attempts=0

}

},1000)

}

</script>

</body>
</html>
