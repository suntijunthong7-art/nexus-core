<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core | Internal Access</title>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container{
  background:#fff;
  width:100%;
  max-width:360px;
  padding:40px 30px;
  border-radius:8px;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
  text-align:center;
}
h1{font-size:18px;margin-bottom:20px;}
input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #d1d5db;
  border-radius:6px;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#1f2937;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}
button:disabled{
  background:#9ca3af;
  cursor:not-allowed;
}
.message{
  font-size:13px;
  margin-top:10px;
}
.footer{
  margin-top:20px;
  font-size:11px;
  color:#6b7280;
}
</style>
</head>

<body>

<div class="container">
  <h1>Internal Access Portal</h1>

  <input type="text" id="user" placeholder="Employee ID">
  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">SIGN IN</button>

  <div class="message" id="msg"></div>

  <div class="footer">
    © 2025 Nexus Core System · Internal Use Only
  </div>
</div>

<script>
const MAX_ATTEMPTS = 3;
const LOCK_TIME = 60000; // 60 วินาที

let attempts = localStorage.getItem("attempts") 
    ? parseInt(localStorage.getItem("attempts")) 
    : 0;

let lockUntil = localStorage.getItem("lockUntil")
    ? parseInt(localStorage.getItem("lockUntil"))
    : 0;

const button = document.querySelector("button");
const msg = document.getElementById("msg");

function checkLock() {
  if (Date.now() < lockUntil) {
    button.disabled = true;
    startCountdown();
  } else {
    button.disabled = false;
  }
}

function startCountdown() {
  let interval = setInterval(() => {
    let remaining = Math.ceil((lockUntil - Date.now()) / 1000);
    if (remaining > 0) {
      msg.style.color = "red";
      msg.innerText = "Account locked. Try again in " + remaining + "s";
    } else {
      clearInterval(interval);
      localStorage.removeItem("lockUntil");
      localStorage.removeItem("attempts");
      attempts = 0;
      button.disabled = false;
      msg.innerText = "";
    }
  }, 1000);
}

function login() {
  if (Date.now() < lockUntil) return;

  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  // ตัวอย่างบัญชีทดสอบ
  if (user === "admin" && pass === "1234") {
    msg.style.color = "green";
    msg.innerText = "Access Granted";
    localStorage.removeItem("attempts");
    localStorage.removeItem("lockUntil");
    attempts = 0;
  } else {
    attempts++;
    localStorage.setItem("attempts", attempts);

    if (attempts >= MAX_ATTEMPTS) {
      lockUntil = Date.now() + LOCK_TIME;
      localStorage.setItem("lockUntil", lockUntil);
      checkLock();
    } else {
      msg.style.color = "red";
      msg.innerText = "Invalid credentials (" + attempts + "/" + MAX_ATTEMPTS + ")";
    }
  }
}

checkLock();
</script>

</body>
</html>
