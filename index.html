<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Federal Secure Access</title>

<style>
body{
    margin:0;
    background:#0a1a2f;
    font-family: "Segoe UI", Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:#ffffff;
}

.wrapper{
    width:90%;
    max-width:380px;
    background:#ffffff;
    color:#1a1a1a;
    border-radius:8px;
    padding:35px 30px;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    text-align:center;
}

.logo{
    width:90px;
    margin-bottom:15px;
}

h1{
    font-size:18px;
    letter-spacing:1px;
    margin-bottom:5px;
    color:#0a1a2f;
}

.subtitle{
    font-size:12px;
    color:#666;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:4px;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#0a1a2f;
}

button{
    width:100%;
    padding:12px;
    background:#0a1a2f;
    color:white;
    border:none;
    border-radius:4px;
    font-size:14px;
    cursor:pointer;
}

button:hover{
    background:#132a4a;
}

.warning{
    margin-top:10px;
    font-size:12px;
    color:red;
    min-height:18px;
}

.footer{
    font-size:10px;
    margin-top:20px;
    color:#777;
}
</style>
</head>

<body>

<div class="wrapper">
    <img src="logo.png" class="logo">
    <h1>FEDERAL SECURE SYSTEM</h1>
    <div class="subtitle">Authorized Personnel Only</div>

    <input type="password" id="password" placeholder="Enter Access Code">
    <button onclick="login()">SIGN IN</button>

    <div class="warning" id="warning"></div>

    <div class="footer">
        This system is monitored. Unauthorized access is prohibited.
    </div>
</div>

<audio id="alarmSound" src="alarm.mp3" preload="auto"></audio>

<script>
let attempts = 0;
const correctPassword = "1234";

function login(){
    const input = document.getElementById("password");
    const warning = document.getElementById("warning");
    const alarm = document.getElementById("alarmSound");

    if(input.value === correctPassword){
        window.location.href = "https://lin.ee/xbIaU45";
        return;
    }

    attempts++;
    alarm.currentTime = 0;
    alarm.play().catch(()=>{});

    if(attempts >= 3){
        warning.innerText = "Multiple failed attempts detected.";
    } else {
        warning.innerText = "Invalid access code.";
    }

    input.value = "";
}
</script>

</body>
</html>
