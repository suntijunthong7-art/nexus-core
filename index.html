<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Secure Access Portal</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
font-family:Arial,Helvetica,sans-serif;
color:#e2e8f0;
}

.login-box{
width:360px;
background:#111827;
padding:40px;
border-radius:10px;
box-shadow:0 0 25px rgba(0,0,0,.6);
text-align:center;
}

.logo{
width:70px;
margin-bottom:20px;
opacity:.9;
}

h1{
font-size:18px;
margin-bottom:25px;
letter-spacing:1px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
background:#1f2937;
border:none;
border-radius:6px;
color:#fff;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
border:none;
border-radius:6px;
color:white;
font-size:14px;
cursor:pointer;
}

button:disabled{
background:#475569;
cursor:not-allowed;
}

.msg{
margin-top:12px;
font-size:13px;
color:#f87171;
}

.timer{
margin-top:10px;
font-size:13px;
color:#fbbf24;
}
</style>
</head>

<body>

<div class="login-box">

<img src="logo.png" class="logo">

<h1>SECURE SYSTEM ACCESS</h1>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">Login</button>

<div class="msg" id="msg"></div>
<div class="timer" id="timer"></div>

</div>

<script>

const USER="admin"
const PASS="1234"
const LOCK_TIME=30

function login(){

const u=document.getElementById("user").value
const p=document.getElementById("pass").value
const msg=document.getElementById("msg")

if(u===USER && p===PASS){

msg.style.color="#4ade80"
msg.innerText="Access granted"

setTimeout(()=>{
window.location="home.html"
},800)

}else{

msg.innerText="Invalid credentials"

let lockUntil=Date.now()+LOCK_TIME*1000
localStorage.setItem("lockUntil",lockUntil)

startLock()

}

}

function startLock(){

const btn=document.getElementById("loginBtn")
const timer=document.getElementById("timer")

btn.disabled=true

let lockUntil=localStorage.getItem("lockUntil")

function update(){

let remaining=Math.floor((lockUntil-Date.now())/1000)

if(remaining<=0){

btn.disabled=false
timer.innerText=""
localStorage.removeItem("lockUntil")
return

}

timer.innerText="Locked "+remaining+" sec"
setTimeout(update,1000)

}

update()

}

window.onload=function(){

let lockUntil=localStorage.getItem("lockUntil")

if(lockUntil && Date.now()<lockUntil){

startLock()

}

}

</script>

</body>
</html>
