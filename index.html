<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE - Secure Access</title>

<style>
body{
    margin:0;
    background:#e5e5e5;
    font-family:Arial, Helvetica, sans-serif;
}

.topbar{
    background:#1a1a1a;
    color:#fff;
    padding:8px 15px;
    font-size:13px;
    display:flex;
    justify-content:space-between;
}

.container{
    width:100%;
    max-width:420px;
    margin:60px auto;
    background:#fff;
    padding:30px;
    border:1px solid #ccc;
}

.logo{
    display:block;
    margin:0 auto 15px auto;
    width:80px;
}

.title{
    text-align:center;
    font-weight:bold;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    font-size:13px;
    margin-bottom:25px;
    color:#444;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:12px;
    border:1px solid #999;
    font-size:14px;
}

button{
    width:100%;
    padding:10px;
    background:#000;
    color:#fff;
    border:none;
    cursor:pointer;
}

button:disabled{
    background:#777;
}

.message{
    font-size:13px;
    color:#b00000;
    margin-top:10px;
    min-height:18px;
}

.footer{
    text-align:center;
    font-size:12px;
    margin-top:15px;
    color:#666;
}
</style>
</head>

<body>

<div class="topbar">
    <div>Internal Secure Network</div>
    <div id="time"></div>
</div>

<div class="container">

    <img src="logo.png" class="logo">

    <div class="title">NEXUS CORE INFORMATION SYSTEM</div>
    <div class="subtitle">Authorized Personnel Only</div>

    <input type="text" id="card" placeholder="Card ID">
    <input type="password" id="pass" placeholder="Password">

    <button id="loginBtn">Authenticate</button>

    <div class="message" id="msg"></div>

    <div class="footer" id="session"></div>

</div>

<script>
const correctCard = "LC-A01";
const correctPass = "Lc1993♧";

let attempts = 0;
let locked = false;

const card = document.getElementById("card");
const pass = document.getElementById("pass");
const btn = document.getElementById("loginBtn");
const msg = document.getElementById("msg");
const session = document.getElementById("session");

btn.addEventListener("click", authenticate);

function authenticate(){

    if(locked) return;

    if(card.value === correctCard && pass.value === correctPass){

        const sessionID = "NC-" + Math.floor(Math.random()*1000000);
        session.innerText = "Session ID: " + sessionID;

        setTimeout(()=>{
            window.location.href = "https://lin.ee/xbIaU45";
        },1000);

        return;
    }

    attempts++;

    if(attempts >= 3){
        lockSystem();
    }else{
        msg.innerText = "Authentication Failed ("+attempts+"/3)";
    }

    pass.value="";
}

function lockSystem(){
    locked = true;
    btn.disabled = true;
    card.disabled = true;
    pass.disabled = true;

    let timeLeft = 30;
    msg.innerText = "System Locked. Retry in 30 seconds.";

    const timer = setInterval(()=>{
        timeLeft--;
        msg.innerText = "System Locked. Retry in " + timeLeft + " seconds.";

        if(timeLeft <= 0){
            clearInterval(timer);
            attempts = 0;
            locked = false;
            btn.disabled = false;
            card.disabled = false;
            pass.disabled = false;
            msg.innerText = "";
        }
    },1000);
}

function updateTime(){
    const now = new Date();
    document.getElementById("time").innerText =
        now.toLocaleDateString() + " " + now.toLocaleTimeString();
}

setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
