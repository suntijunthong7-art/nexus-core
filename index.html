<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE | Internal Access</title>

<style>
body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#fff;
  width:100%;
  max-width:360px;
  padding:40px 30px;
  border-radius:8px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  text-align:center;
}

h1{margin-bottom:20px;}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#1f2937;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

.error{
  color:red;
  font-size:13px;
  display:none;
  margin-bottom:10px;
}
</style>
</head>
<body>

<div class="container">
  <h1>Internal Access Portal</h1>

  <div class="error" id="errorMsg">Invalid credentials</div>

  <input type="text" id="empId" placeholder="Employee ID">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">SIGN IN</button>
</div>

<script>
function login(){
  const id = document.getElementById("empId").value.trim();
  const pass = document.getElementById("password").value.trim();
  const error = document.getElementById("errorMsg");

  error.style.display="none";

  if(id === "" || pass === ""){
    error.textContent="Please enter credentials";
    error.style.display="block";
    return;
  }

  if(id === "admin" && pass === "1234"){
    const sessionData = {
      user:id,
      loginTime: Date.now()
    };
    localStorage.setItem("session", JSON.stringify(sessionData));
    window.location.href="dashboard.html";
  } else {
    error.textContent="Invalid credentials";
    error.style.display="block";
  }
}
</script>

</body>
</html>
