<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE - Access Control</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Tahoma,sans-serif;}

body{
    background:linear-gradient(135deg,#1f2d3a,#2f4454);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:100%;
    max-width:400px;
    padding:20px;
}

.card{
    background:white;
    padding:35px 25px;
    border-radius:14px;
    box-shadow:0 20px 40px rgba(0,0,0,0.25);
    text-align:center;
}

.logo{
    width:90px;
    margin-bottom:15px;
}

h2{
    margin-bottom:5px;
}

.subtitle{
    color:#777;
    font-size:14px;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:6px;
    background:#2f4454;
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

button:disabled{
    background:#999;
    cursor:not-allowed;
}

button:hover:not(:disabled){
    background:#1f2d3a;
}

.message{
    margin-top:15px;
    font-size:14px;
    min-height:20px;
}

.error{color:#d32f2f;}
.success{color:#2e7d32;}
.lock{color:#ff9800;}

.footer{
    text-align:center;
    margin-top:20px;
    color:white;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">
        <!-- ใส่ไฟล์โลโก้ของคุณ -->
        <img src="logo.png" class="logo" alt="NEXUS CORE Logo">

        <h2>NEXUS CORE</h2>
        <div class="subtitle">Access Control System</div>

        <input type="text" id="card" placeholder="รหัสประจำตัวเจ้าหน้าที่">
        <input type="password" id="pass" placeholder="รหัสผ่าน">

        <button id="loginBtn">เข้าสู่ระบบ</button>

        <div class="message" id="msg"></div>
    </div>

    <div class="footer">
        © 2026 NEXUS CORE Security Division
    </div>
</div>

<script>
const correctCard="LC-A01";
const correctPass="Lc1993♧";

let attempts=0;
let lockUntil=0;

const btn=document.getElementById("loginBtn");
const msg=document.getElementById("msg");

btn.addEventListener("click", function(){

    if(Date.now()<lockUntil){
        return;
    }

    const card=document.getElementById("card").value;
    const pass=document.getElementById("pass").value;

    if(card===correctCard && pass===correctPass){
        msg.className="message success";
        msg.innerText="ยืนยันตัวตนสำเร็จ กำลังเข้าสู่ระบบ...";
        btn.disabled=true;

        setTimeout(()=>{
            msg.innerText="เข้าสู่ระบบสำเร็จ";
        },1500);

    }else{
        attempts++;
        msg.className="message error";
        msg.innerText="รหัสไม่ถูกต้อง";

        if(attempts===3){
            lockSystem(30);
        }
        if(attempts===6){
            lockSystem(60);
        }
        if(attempts===9){
            lockSystem(300);
        }
    }

});

function lockSystem(seconds){
    lockUntil=Date.now()+(seconds*1000);
    btn.disabled=true;
    msg.className="message lock";
    countdown(seconds);
}

function countdown(sec){
    let timer=setInterval(()=>{
        let remain=Math.ceil((lockUntil-Date.now())/1000);

        if(remain<=0){
            clearInterval(timer);
            attempts=0;
            btn.disabled=false;
            msg.innerText="สามารถเข้าสู่ระบบได้อีกครั้ง";
            msg.className="message";
        }else{
            msg.innerText="ระบบถูกล็อคชั่วคราว ("+remain+" วินาที)";
        }

    },1000);
}
</script>

</body>
</html>
