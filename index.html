<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core System</title>

<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0b2c36,#062028);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
color:#333;
}

.login-box{
background:white;
padding:30px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.logo{
font-size:20px;
font-weight:bold;
margin-bottom:5px;
}

.subtitle{
font-size:12px;
color:#777;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:6px;
background:#2d3f50;
color:white;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:#9aa3aa;
}

.message{
margin-top:10px;
font-size:12px;
color:#c0392b;
}

.security{
font-size:11px;
margin-top:12px;
color:#666;
}

.scan{
font-size:11px;
color:#888;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="login-box">

<div class="logo">NEXUS CORE SYSTEM</div>
<div class="subtitle">Secure Access Portal</div>

<div class="scan" id="scanText">
Initializing security modules...
</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div class="message" id="msg"></div>

<div class="security">
Authorized personnel only.  
All access attempts are logged and monitored.  
© 2025 Nexus Core Systems
</div>

</div>

<script>

const correctUser="admin"
const correctPass="1234"

let attempts=localStorage.getItem("attempts") || 0
let lockUntil=localStorage.getItem("lockUntil") || 0

const msg=document.getElementById("msg")
const btn=document.getElementById("loginBtn")
const userInput=document.getElementById("user")
const passInput=document.getElementById("pass")

function checkLock(){

let now=Date.now()

if(lockUntil>now){

btn.disabled=true
userInput.disabled=true
passInput.disabled=true

let remaining=Math.ceil((lockUntil-now)/1000)

msg.innerHTML="Security Lock Active — Retry in "+remaining+"s"

setTimeout(checkLock,1000)

}else{

btn.disabled=false
userInput.disabled=false
passInput.disabled=false

msg.innerHTML=""

}

}

function login(){

let u=userInput.value
let p=passInput.value

if(u===correctUser && p===correctPass){

msg.style.color="green"
msg.innerHTML="Access Granted — Redirecting..."

setTimeout(()=>{
window.location.href="https://lin.ee/lGGma6p"
},1200)

}else{

attempts++
localStorage.setItem("attempts",attempts)

msg.style.color="#c0392b"
msg.innerHTML="Authentication Failed"

if(attempts>=9){

lock(180)

}else if(attempts>=6){

lock(60)

}else if(attempts>=3){

lock(20)

}

}

}

function lock(seconds){

lockUntil=Date.now()+seconds*1000

localStorage.setItem("lockUntil",lockUntil)

checkLock()

}

document.addEventListener("keypress",function(e){
if(e.key==="Enter") login()
})

checkLock()


const scanMessages=[
"Initializing security modules...",
"Verifying session fingerprint...",
"Checking device integrity...",
"Establishing secure channel..."
]

let i=0

setInterval(()=>{
document.getElementById("scanText").innerText=scanMessages[i]
i=(i+1)%scanMessages.length
},2500)

</script>

</body>
</html>
