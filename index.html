<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core | Internal Access</title>

<style>
body{
  margin:0;
  font-family:Segoe UI,Arial,sans-serif;
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#fff;
  width:360px;
  padding:40px 30px;
  border-radius:10px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  text-align:center;
}

.logo{
  width:80px;
  margin-bottom:10px;
}

h1{
  font-size:18px;
  margin-bottom:25px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  background:#1f2937;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

.error{
  color:#dc2626;
  font-size:13px;
  display:none;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="box">

<img src="logo.png" class="logo" onerror="this.style.display='none'">

<h1>Internal Access Portal</h1>

<div class="error" id="errorMsg"></div>

<input type="text" id="empId" placeholder="Employee ID">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">SIGN IN</button>

</div>

<script>
const SESSION_TIME = 5 * 60 * 1000; // 5 นาที

function login(){
  const id = document.getElementById("empId").value.trim();
  const pass = document.getElementById("password").value.trim();
  const error = document.getElementById("errorMsg");

  if(id === "" || pass === ""){
    error.textContent = "Please enter Employee ID and Password";
    error.style.display = "block";
    return;
  }

  if(id === "admin" && pass === "1234"){
    const expiry = Date.now() + SESSION_TIME;
    localStorage.setItem("sessionExpiry", expiry);
    window.location.href = "dashboard.html";
  } else {
    error.textContent = "Invalid credentials";
    error.style.display = "block";
  }
}
</script>

</body>
</html>
