<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE - Secure Access</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: radial-gradient(circle at center, #0b1e33 0%, #050c18 100%);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    width:90%;
    max-width:380px;
    background:#0f2238;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 40px rgba(0,0,0,0.9);
    border-top:4px solid gold;
    text-align:center;
}

.logo{
    width:85px;
    margin-bottom:15px;
}

h1{
    margin:5px 0;
    letter-spacing:2px;
}

.subtitle{
    font-size:13px;
    opacity:0.7;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #1f3a5a;
    background:#081625;
    color:white;
    font-size:14px;
}

button{
    width:100%;
    padding:13px;
    background:goldenrod;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    opacity:0.9;
}

.message{
    margin-top:10px;
    font-size:13px;
    color:#ff4d4d;
    min-height:18px;
}

.footer{
    font-size:11px;
    opacity:0.6;
    margin-top:15px;
}

.locked{
    background:black;
    color:red;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:monospace;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">
    <img src="logo.png" class="logo">
    <h1>NEXUS CORE</h1>
    <div class="subtitle">Central Intelligence Division</div>

    <input id="username" type="text" placeholder="รหัสตัวแทน">
    <input id="password" type="password" placeholder="รหัสเข้าใช้งาน">

    <button onclick="login()">AUTHORIZED ACCESS</button>

    <div id="msg" class="message"></div>

    <div class="footer">
        Official Use Only<br>
        Unauthorized access is prohibited.
    </div>
</div>

<script>
let attempts = 0;

function login(){

    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();
    const msg = document.getElementById("msg");

    const correctUser = "admin";
    const correctPass = "1234";

    if(user === correctUser && pass === correctPass){
        window.location.href = "https://lin.ee/xbIaU45";
    }
    else{
        attempts++;

        if(attempts >= 3){
            document.body.innerHTML = `
                <div class="locked">
                    <h1>⚠ SECURITY BREACH DETECTED ⚠</h1>
                    <p>Multiple failed login attempts detected.</p>
                    <p>System locked.</p>
                </div>
            `;
        }else{
            msg.innerText = "รหัสไม่ถูกต้อง (" + attempts + "/3)";
        }
    }
}
</script>

</body>
</html>
