<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS Secure System</title>

<style>
body{
    margin:0;
    font-family:"Segoe UI",Tahoma,sans-serif;
    background:#dcdcdc;
}
.topbar{
    background:#000;
    color:#fff;
    padding:10px 15px;
    display:flex;
    justify-content:space-between;
    font-size:14px;
}
.container{
    max-width:500px;
    margin:50px auto;
    background:#f4f4f4;
    padding:45px 35px;
    text-align:center;
    box-shadow:0 3px 15px rgba(0,0,0,0.25);
}
.logo{
    width:110px;
    margin-bottom:25px;
}
h2{
    margin:10px 0 5px 0;
    font-weight:700;
}
.subtitle{
    color:#555;
    font-size:14px;
    margin-bottom:35px;
    line-height:1.6;
}
input{
    width:100%;
    padding:14px;
    margin:12px 0;
    border:2px solid #888;
    background:#e9e9e9;
    font-size:15px;
    box-sizing:border-box;
}
input:disabled{
    background:#d0d0d0;
}
button{
    width:100%;
    padding:14px;
    margin-top:15px;
    background:#6f6f6f;
    color:white;
    border:none;
    font-size:16px;
    cursor:pointer;
}
button:disabled{
    background:#b5b5b5;
}
#msg{
    margin-top:18px;
    font-weight:bold;
}
.footer{
    margin-top:25px;
    font-size:13px;
    color:#777;
}
@keyframes shake {
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}
</style>
</head>

<body>

<div class="topbar">
    <div>เครือข่ายภายในที่ปลอดภัย</div>
    <div id="datetime"></div>
</div>

<div class="container">
    <img src="logo.png" class="logo">

    <h2>ระบบสารสนเทศหลัก NEXUS</h2>

    <div class="subtitle">
        เฉพาะบุคลากรที่ได้รับอนุญาตเท่านั้น<br>
        ระดับการรักษาความปลอดภัย: ต้องมีใบอนุญาตระดับ 3
    </div>

    <input type="text" id="card" placeholder="รหัสบัตรประจำตัว">
    <input type="password" id="pass" placeholder="รหัสผ่าน">

    <button id="loginBtn" onclick="authenticate()">ยืนยันตัวตน</button>

    <div id="msg"></div>

    <div class="footer">
        การเข้าถึงโดยไม่ได้รับอนุญาตอาจถูกตรวจสอบและดำเนินคดี
    </div>
</div>

<script>
const correctCard="LC-A01";
const correctPass="Lc1993♧";

let failCount=0;
let lockUntil=0;
let timerInterval=null;

function updateTime(){
    const now=new Date();
    document.getElementById("datetime").innerText=
    now.toLocaleDateString("en-GB")+" "+now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();

function authenticate(){

    const now=Date.now();
    if(now<lockUntil) return;

    const card=document.getElementById("card").value.trim();
    const pass=document.getElementById("pass").value.trim();
    const message=document.getElementById("msg");

    if(card===correctCard && pass===correctPass){

        message.style.color="green";
        message.innerText="ยืนยันตัวตนสำเร็จ";

    }else{

        failCount++;

        document.querySelector(".container").style.animation="shake 0.3s";
        setTimeout(()=>{document.querySelector(".container").style.animation="";},300);

        message.style.color="red";
        message.innerText="ข้อมูลไม่ถูกต้อง";

        if(failCount===3) lockSystem(30);
        if(failCount===6) lockSystem(60);
        if(failCount===9) lockSystem(180);
    }
}

function lockSystem(seconds){

    const message=document.getElementById("msg");
    const button=document.getElementById("loginBtn");
    const cardInput=document.getElementById("card");
    const passInput=document.getElementById("pass");

    lockUntil=Date.now()+seconds*1000;

    button.disabled=true;
    cardInput.disabled=true;
    passInput.disabled=true;

    timerInterval=setInterval(()=>{

        const remaining=Math.ceil((lockUntil-Date.now())/1000);

        if(remaining<=0){
            clearInterval(timerInterval);
            button.disabled=false;
            cardInput.disabled=false;
            passInput.disabled=false;
            message.innerText="";
        }else{
            message.style.color="red";
            message.innerText=
            "ระบบล็อกอยู่ โปรดลองใหม่อีกครั้งใน "+remaining+" วินาที";
        }

    },1000);
}
</script>

</body>
</html>
