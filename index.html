<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Control</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#d9d9d9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:30px;
    width:340px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
    border-radius:6px;
}

.card img{
    width:70px;
    margin-bottom:10px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
}

button{
    width:100%;
    padding:10px;
    background:#2f4f5f;
    color:white;
    border:none;
    cursor:pointer;
}

button:disabled{
    background:gray;
    cursor:not-allowed;
}

#lockMessage{
    color:red;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
    <!-- โลโก้ (ไม่หายแน่นอน) -->
    <img src="https://cdn-icons-png.flaticon.com/512/565/565547.png">

    <h3>ระบบตรวจสอบสิทธิการเข้าใช้งาน</h3>

    <input type="text" id="card" placeholder="รหัสประจำตัวเจ้าหน้าที่">
    <input type="password" id="pass" placeholder="รหัสผ่าน">

    <button onclick="login()" id="loginBtn">เข้าสู่ระบบ</button>

    <div id="lockMessage"></div>
</div>

<script>

// =======================
// 🔐 ข้อมูลถูกต้อง
// =======================
const correctCard="LC-A01";
const correctPass="Lc1993♧";

// =======================
// โหลดค่าการล็อคจาก localStorage (กันรีเฟรชหนี)
// =======================
let attempts = parseInt(localStorage.getItem("attempts")) || 0;
let lockUntil = parseInt(localStorage.getItem("lockUntil")) || 0;

const now = Date.now();

if(now < lockUntil){
    startLockCountdown();
}

// =======================
// ฟังก์ชันล็อก
// =======================
function startLockCountdown(){
    const btn = document.getElementById("loginBtn");
    const msg = document.getElementById("lockMessage");

    btn.disabled = true;

    let interval = setInterval(()=>{
        let remaining = Math.floor((lockUntil - Date.now())/1000);

        if(remaining <= 0){
            clearInterval(interval);
            btn.disabled = false;
            msg.innerHTML="";
            localStorage.removeItem("lockUntil");
            localStorage.setItem("attempts",0);
            attempts=0;
        }else{
            msg.innerHTML="ระบบถูกล็อค กรุณารอ "+remaining+" วินาที";
        }

    },1000);
}

// =======================
// Login
// =======================
function login(){

    if(Date.now() < lockUntil){
        return;
    }

    const card = document.getElementById("card").value;
    const pass = document.getElementById("pass").value;

    if(card===correctCard && pass===correctPass){
        alert("เข้าสู่ระบบสำเร็จ");
        localStorage.setItem("attempts",0);
        attempts=0;
    }else{

        attempts++;
        localStorage.setItem("attempts",attempts);

        alert("รหัสไม่ถูกต้อง");

        // 🔴 ล็อค 3-6-9 ครั้ง
        if(attempts===3){
            lock(30); // 30 วิ
        }
        if(attempts===6){
            lock(60); // 1 นาที
        }
        if(attempts>=9){
            lock(180); // 3 นาที
        }
    }
}

// =======================
// ตั้งเวลาล็อค
// =======================
function lock(seconds){
    lockUntil = Date.now() + (seconds*1000);
    localStorage.setItem("lockUntil",lockUntil);
    startLockCountdown();
}

// =======================
// ป้องกันจอว่าง
// =======================
window.onerror=function(){
    document.body.innerHTML="<h2 style='text-align:center;margin-top:40%;color:red'>เกิดข้อผิดพลาดระบบ</h2>";
};

</script>

</body>
</html>
