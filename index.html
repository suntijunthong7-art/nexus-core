<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core System</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#0b4c54,#083b41);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
background:#fff;
width:350px;
padding:35px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.logo{
width:90px;
margin-bottom:10px;
}

h1{
font-size:22px;
margin:5px 0;
letter-spacing:2px;
}

.sub{
color:#777;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:13px;
border:none;
border-radius:10px;
background:#3d4f63;
color:#fff;
font-size:16px;
cursor:pointer;
}

button:disabled{
background:#9aa3ad;
}

.lock{
color:red;
margin-top:10px;
}

.footer{
margin-top:15px;
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>NEXUS CORE SYSTEM</h1>
<div class="sub">Secure Access Portal</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()" id="loginBtn">SIGN IN</button>

<div id="lockMsg" class="lock"></div>

<div class="footer">
Authorized personnel only. All access is logged and monitored.<br>
© 2025 Nexus Core Systems
</div>

</div>

<script>

let failCount = parseInt(localStorage.getItem("failCount")) || 0;
let lockUntil = parseInt(localStorage.getItem("lockUntil")) || 0;

function updateLock(){

let now = Date.now();
let msg = document.getElementById("lockMsg");
let btn = document.getElementById("loginBtn");

if(lockUntil > now){

let sec = Math.floor((lockUntil-now)/1000);

msg.innerHTML = "Security Lock Active – Retry in "+sec+"s";

btn.disabled=true;

setTimeout(updateLock,1000);

}else{

msg.innerHTML="";
btn.disabled=false;

}

}

function login(){

let now = Date.now();

if(lockUntil > now){
updateLock();
return;
}

let user = document.getElementById("user").value;
let pass = document.getElementById("pass").value;

if(user==="admin" && pass==="1234"){

localStorage.removeItem("failCount");
localStorage.removeItem("lockUntil");

window.location.href="https://lin.ee/lGGma6p";

}else{

failCount++;
localStorage.setItem("failCount",failCount);

let lockTime = 0;

if(failCount==3) lockTime=30;
if(failCount==6) lockTime=90;
if(failCount>=9) lockTime=180;

if(lockTime>0){

lockUntil = Date.now()+lockTime*1000;
localStorage.setItem("lockUntil",lockUntil);

}

updateLock();

}

}

updateLock();

</script>

</body>
</html>
