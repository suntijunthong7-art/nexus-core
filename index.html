<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE | OMEGA GATEWAY</title>
<style>
    /* OMEGA LEVEL AESTHETICS */
    :root {
        --gold: #d4af37;
        --dark-gold: #8a7322;
        --black: #050505;
        --panel: #0f0f0f;
        --alert: #ff2a2a;
    }

    body {
        font-family: 'Courier New', Courier, monospace;
        background-color: var(--black);
        color: var(--gold);
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    /* CRT Scanline Effect */
    .scanlines {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                    linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        background-size: 100% 2px, 3px 100%;
        pointer-events: none;
        z-index: 99;
    }

    .gateway-container {
        background: var(--panel);
        border: 1px solid var(--dark-gold);
        box-shadow: 0 0 30px rgba(212, 175, 55, 0.15), inset 0 0 20px rgba(0,0,0,0.8);
        padding: 40px;
        width: 340px;
        position: relative;
        z-index: 10;
        display: none; /* Hidden until boot sequence finishes */
    }

    .terminal-header {
        text-align: center;
        border-bottom: 1px solid var(--dark-gold);
        padding-bottom: 15px;
        margin-bottom: 25px;
    }

    .logo {
        width: 70px;
        margin-bottom: 15px;
        filter: drop-shadow(0 0 5px var(--dark-gold));
    }

    .title {
        font-size: 22px;
        font-weight: 900;
        letter-spacing: 4px;
        text-transform: uppercase;
        text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
    }

    .subtitle {
        font-size: 10px;
        letter-spacing: 2px;
        color: #888;
        margin-top: 5px;
    }

    .input-group {
        margin-bottom: 15px;
        position: relative;
    }

    .input-group::before {
        content: '>';
        position: absolute;
        left: 10px;
        top: 14px;
        color: var(--dark-gold);
        font-weight: bold;
    }

    input {
        width: 100%;
        background: #000;
        border: 1px solid #333;
        color: var(--gold);
        padding: 14px 14px 14px 30px;
        font-family: 'Courier New', Courier, monospace;
        font-size: 14px;
        box-sizing: border-box;
        letter-spacing: 1px;
        transition: border 0.3s;
    }

    input:focus {
        outline: none;
        border-color: var(--gold);
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
    }

    input::placeholder {
        color: #444;
    }

    button {
        width: 100%;
        background: transparent;
        color: var(--gold);
        border: 1px solid var(--gold);
        padding: 15px;
        font-family: 'Courier New', Courier, monospace;
        font-size: 14px;
        font-weight: bold;
        letter-spacing: 3px;
        cursor: pointer;
        transition: all 0.2s;
        text-transform: uppercase;
        margin-top: 10px;
    }

    button:hover:not(:disabled) {
        background: var(--gold);
        color: var(--black);
        box-shadow: 0 0 15px var(--gold);
    }

    button:disabled {
        border-color: #333;
        color: #333;
        cursor: not-allowed;
    }

    #sys-message {
        margin-top: 15px;
        min-height: 20px;
        font-size: 11px;
        text-align: center;
        letter-spacing: 1px;
        font-weight: bold;
    }

    .footer {
        text-align: center;
        font-size: 9px;
        color: #555;
        margin-top: 30px;
        letter-spacing: 1px;
    }

    /* Boot Sequence Screen */
    #boot-screen {
        width: 100%;
        max-width: 400px;
        padding: 20px;
        font-size: 12px;
        line-height: 1.6;
    }
    .cursor {
        display: inline-block;
        width: 8px;
        height: 12px;
        background-color: var(--gold);
        animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

</style>
</head>
<body>

<div class="scanlines"></div>

<div id="boot-screen">
    <div id="boot-text"></div>
    <span class="cursor"></span>
</div>

<div class="gateway-container" id="gateway">
    <div class="terminal-header">
        <img src="logo.png" class="logo" alt="NEXUS CORE" onerror="this.style.display='none'">
        <div class="title">NEXUS CORE</div>
        <div class="subtitle">SUPREME COMMAND TERMINAL</div>
    </div>

    <div class="input-group">
        <input id="user" type="text" placeholder="AUTHORIZATION ID" autocomplete="off" spellcheck="false">
    </div>
    <div class="input-group">
        <input id="pass" type="password" placeholder="PASSCODE" spellcheck="false">
    </div>

    <button id="loginBtn" onclick="initiateLink()">AUTHENTICATE</button>

    <div id="sys-message"></div>

    <div class="footer">
        SECURITY PROTOCOL: OMEGA-LEVEL<br>
        UNAUTHORIZED ACCESS IS TRACKED IN REAL-TIME<br>
        © 2026 BLACKROOM INTEL DIVISION
    </div>
</div>

<script>
// ==========================================
// NEXUS CORE: TERMINAL LOGIC V2.0
// ==========================================

const VALID_ID = "SANTINO_J";
const VALID_PASS = "NEXUS941";
const DESTINATION_URL = "https://lin.ee/lGGma6p";

const bootScreen = document.getElementById('boot-screen');
const bootText = document.getElementById('boot-text');
const gateway = document.getElementById('gateway');
const msg = document.getElementById('sys-message');
const btn = document.getElementById('loginBtn');
const userInp = document.getElementById('user');
const passInp = document.getElementById('pass');

let attempts = parseInt(localStorage.getItem('nc_attempts')) || 0;
let lockUntil = parseInt(localStorage.getItem('nc_lock')) || 0;

// Boot Sequence Animation
const bootLines = [
    "INITIALIZING NEXUS CORE OS v3.1...",
    "ESTABLISHING SECURE SATELLITE UPLINK... [OK]",
    "LOADING BLACKROOM INTEL DIVISION PROTOCOLS... [OK]",
    "BYPASSING LOCAL FIREWALLS... [OK]",
    "ENCRYPTING SIGNAL (AES-256)... [OK]",
    "AWAITING SUPREME COMMANDER AUTHENTICATION..."
];

let lineIndex = 0;
let charIndex = 0;

function typeWriter() {
    if (lineIndex < bootLines.length) {
        if (charIndex < bootLines[lineIndex].length) {
            bootText.innerHTML += bootLines[lineIndex].charAt(charIndex);
            charIndex++;
            setTimeout(typeWriter, 15); // Typing speed
        } else {
            bootText.innerHTML += "<br>";
            lineIndex++;
            charIndex = 0;
            setTimeout(typeWriter, 150); // Delay between lines
        }
    } else {
        setTimeout(() => {
            bootScreen.style.display = 'none';
            gateway.style.display = 'block';
            checkLockStatus();
        }, 800);
    }
}

// Start boot sequence on load
window.onload = typeWriter;

function initiateLink() {
    let now = Date.now();
    if (now < lockUntil) {
        executeLockout();
        return;
    }

    let u = userInp.value.toUpperCase(); // Case insensitive for ID
    let p = passInp.value;

    if (u === VALID_ID && p === VALID_PASS) {
        // Success Protocol
        localStorage.removeItem('nc_attempts');
        localStorage.removeItem('nc_lock');
        
        msg.style.color = "var(--gold)";
        msg.innerText = "IDENTITY CONFIRMED. ROUTING TO SECURE CHANNEL...";
        btn.disabled = true;
        
        setTimeout(() => {
            window.location.href = DESTINATION_URL;
        }, 1200);
        return;
    }

    // Failure Protocol
    attempts++;
    localStorage.setItem('nc_attempts', attempts);
    
    let penaltyTime = 0;
    if (attempts >= 5) penaltyTime = 300000; // 5 mins
    else if (attempts >= 3) penaltyTime = 60000;  // 1 min

    if (penaltyTime > 0) {
        lockUntil = Date.now() + penaltyTime;
        localStorage.setItem('nc_lock', lockUntil);
        executeLockout();
    } else {
        msg.style.color = "var(--alert)";
        msg.innerText = `[ACCESS DENIED] INVALID SIGNATURE. ATTEMPT ${attempts}/3`;
        passInp.value = "";
    }
}

function executeLockout() {
    btn.disabled = true;
    userInp.disabled = true;
    passInp.disabled = true;
    userInp.value = "";
    passInp.value = "";
    
    let timer = setInterval(() => {
        let remaining = Math.ceil((lockUntil - Date.now()) / 1000);
        
        if (remaining <= 0) {
            clearInterval(timer);
            btn.disabled = false;
            userInp.disabled = false;
            passInp.disabled = false;
            msg.innerText = "";
            localStorage.removeItem('nc_lock');
            return;
        }
        
        msg.style.color = "var(--alert)";
        msg.innerText = `TERMINAL LOCKED. EVASIVE PROTOCOL ACTIVE: ${remaining}s`;
    }, 1000);
}

function checkLockStatus() {
    if (Date.now() < lockUntil) {
        executeLockout();
    }
}
</script>
</body>
</html>
