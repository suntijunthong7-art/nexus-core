<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<style>

body{
font-family: system-ui, Arial, sans-serif;
background:#0f1e2e;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:#ffffff;
width:340px;
padding:30px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.25);
text-align:center;
}

.logo{
width:70px;
margin-bottom:10px;
}

h1{
font-size:18px;
margin:5px 0;
color:#2c3e50;
}

h2{
font-size:22px;
margin-bottom:20px;
color:#1a1a1a;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#1f2f45;
color:white;
border:none;
border-radius:6px;
font-weight:600;
cursor:pointer;
}

button:disabled{
background:#888;
}

.message{
margin-top:10px;
font-size:14px;
}

.footer{
margin-top:20px;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h1>NEXUS CORE SYSTEM</h1>
<h2>Secure Access Portal</h2>

<input id="username" placeholder="User ID">
<input id="password" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div id="msg" class="message"></div>

<div class="footer">
© 2025 Nexus Core
</div>

</div>

<script>

const correctUser="admin"
const correctPass="1234"

let attempts=0

function login(){

let user=document.getElementById("username").value
let pass=document.getElementById("password").value
let msg=document.getElementById("msg")
let btn=document.getElementById("loginBtn")

if(user===correctUser && pass===correctPass){

msg.style.color="green"
msg.innerText="Access granted. Redirecting..."

setTimeout(()=>{
window.location.href="https://lin.ee/lGGma6p"
},1500)

}

else{

attempts++
msg.style.color="red"
msg.innerText="Invalid credentials"

if(attempts>=3){

btn.disabled=true

let time=30

msg.innerText="Too many attempts. Try again in "+time+"s"

let timer=setInterval(()=>{

time--
msg.innerText="Too many attempts. Try again in "+time+"s"

if(time<=0){
clearInterval(timer)
btn.disabled=false
msg.innerText=""
attempts=0
}

},1000)

}

}

}

</script>

</body>
</html>
