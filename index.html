<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0c3b4a,#0e5566);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{

background:white;
width:340px;
padding:35px;
border-radius:16px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
text-align:center;

}

.logo{
width:60px;
margin-bottom:10px;
}

h1{
font-size:22px;
margin:5px 0;
letter-spacing:2px;
}

.subtitle{
color:#555;
margin-bottom:20px;
}

input{

width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;

}

button{

width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#334155;
color:white;
font-weight:bold;
letter-spacing:1px;
cursor:pointer;
transition:all .2s;

}

button:hover{
background:#1e293b;
}

button:disabled{
background:#9aa3af;
cursor:not-allowed;
}

.lock{
color:red;
margin-top:12px;
font-size:14px;
}

.footer{
margin-top:18px;
font-size:12px;
color:#666;
}

</style>
</head>

<body>

<div class="card">

<img src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png" class="logo">

<h1>NEXUS CORE SYSTEM</h1>

<div class="subtitle">Secure Access Portal</div>

<input id="user" placeholder="User ID">

<input id="pass" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div id="lockmsg" class="lock"></div>

<div class="footer">

Authorized personnel only. Unauthorized access is strictly prohibited and monitored.

<br><br>

© 2025 Nexus Core Systems  
Internal Access Gateway v2.4.1

</div>

</div>

<script>

let attempts=0
let lockTime=0
let timer=null

function login(){

if(lockTime>0) return

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u==="admin" && p==="1234"){

alert("Access Granted")

attempts=0
return

}

attempts++

if(attempts>=3){

if(attempts==3) lockTime=30
else if(attempts==4) lockTime=90
else lockTime=180

startLock()

}else{

alert("Invalid credentials")

}

}

function startLock(){

let btn=document.getElementById("loginBtn")
let msg=document.getElementById("lockmsg")

btn.disabled=true

timer=setInterval(()=>{

msg.innerHTML="Security Lock Active — Retry in "+lockTime+"s"

lockTime--

if(lockTime<=0){

clearInterval(timer)

btn.disabled=false

msg.innerHTML=""

}

},1000)

}

</script>

</body>
</html>
