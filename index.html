<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<link rel="icon" href="logo.png">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
width:320px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

.logo{
width:80px;
margin-bottom:10px;
animation:spin 12s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

h1{
font-size:16px;
letter-spacing:2px;
color:#555;
}

h2{
margin-top:5px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#1f2d3d;
color:white;
font-size:16px;
cursor:pointer;
}

button:disabled{
background:#888;
}

.status{
margin-top:15px;
font-size:13px;
color:red;
}

.security{
margin-top:20px;
font-size:11px;
color:#777;
}

.loading{
display:none;
margin-top:10px;
color:#333;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>NEXUS CORE SYSTEM</h1>
<h2>Secure Access Portal</h2>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()" id="btn">SIGN IN</button>

<div class="loading" id="loading">
Authorizing...<br>
Verifying credentials...<br>
Connecting to secure gateway...
</div>

<div class="status" id="status"></div>

<div class="security">
System Status : SECURE<br>
Network : Private Gateway<br>
Access Level : Authorized Personnel Only<br><br>

WARNING: Unauthorized access is prohibited and monitored.
</div>

</div>

<script>

let correctUser="admin"
let correctPass="1234"

let attempts=0
let lockTime=0

function login(){

if(lockTime>0){
return
}

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value
let status=document.getElementById("status")
let loading=document.getElementById("loading")

if(user===correctUser && pass===correctPass){

loading.style.display="block"
status.innerHTML="Access Granted"

setTimeout(()=>{
window.location.href="https://lin.ee/lGGma6p"
},2500)

}else{

attempts++

if(attempts==3){lock(30)}
if(attempts==6){lock(90)}
if(attempts>=9){lock(180)}

status.innerHTML="Invalid credentials"

}

}

function lock(seconds){

lockTime=seconds
let btn=document.getElementById("btn")
btn.disabled=true

let status=document.getElementById("status")

let timer=setInterval(()=>{

lockTime--

status.innerHTML="Account locked. Try again in "+lockTime+"s"

if(lockTime<=0){
clearInterval(timer)
btn.disabled=false
status.innerHTML=""
}

},1000)

}

</script>

</body>
</html>
