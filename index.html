<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Government Information System</title>

<style>
body{
    margin:0;
    background:#e6e6e6;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#ffffff;
    width:95%;
    max-width:420px;
    padding:25px;
    border:1px solid #cfcfcf;
}

.logo{
    display:block;
    margin:0 auto 15px auto;
    width:70px;
}

.header{
    font-size:16px;
    font-weight:bold;
    text-align:center;
    margin-bottom:5px;
}

.subheader{
    font-size:13px;
    text-align:center;
    margin-bottom:20px;
    color:#444;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #999;
    font-size:14px;
}

button{
    width:100%;
    padding:10px;
    background:#000;
    color:#fff;
    border:none;
    font-size:14px;
    cursor:pointer;
}

button:disabled{
    background:#888;
    cursor:not-allowed;
}

.warning{
    font-size:13px;
    color:#b00000;
    margin-top:10px;
    min-height:18px;
}
</style>
</head>

<body>

<div class="container">

    <img src="logo.png" class="logo">

    <div class="header">U.S. GOVERNMENT INFORMATION SYSTEM</div>
    <div class="subheader">Authorized Use Only</div>

    <input type="password" id="password" placeholder="Enter Access Code">
    <button id="loginBtn">Sign In</button>

    <div class="warning" id="warning"></div>

</div>

<script>
let attempts = 0;
const correctPassword = "0000";
let locked = false;
let countdownInterval;

const input = document.getElementById("password");
const btn = document.getElementById("loginBtn");
const warning = document.getElementById("warning");

btn.addEventListener("click", login);

function login(){

    if(locked) return;

    if(input.value === correctPassword){
        window.location.href = "https://lin.ee/xbIaU45";
        return;
    }

    attempts++;

    if(attempts >= 3){
        lockSystem();
    } else {
        warning.innerText = "Invalid credentials (" + attempts + "/3)";
    }

    input.value = "";
}

function lockSystem(){
    locked = true;
    btn.disabled = true;
    input.disabled = true;

    let timeLeft = 30;
    warning.innerText = "System locked. Try again in 30 seconds.";

    countdownInterval = setInterval(function(){

        timeLeft--;
        warning.innerText = "System locked. Try again in " + timeLeft + " seconds.";

        if(timeLeft <= 0){
            clearInterval(countdownInterval);
            attempts = 0;
            locked = false;
            btn.disabled = false;
            input.disabled = false;
            warning.innerText = "";
        }

    },1000);
}
</script>

</body>
</html>
