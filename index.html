<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE</title>

<style>
body{
  margin:0;
  font-family:Segoe UI,Tahoma,sans-serif;
  background:linear-gradient(135deg,#1f2d3a,#2f4454);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:white;
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2f4454;
  color:white;
  cursor:pointer;
}

.error{
  color:red;
  font-size:14px;
  margin-top:10px;
}
</style>
</head>
<body>

<div class="card">
  <h2>NEXUS CORE</h2>

  <input type="text" id="user" placeholder="รหัสประจำตัว">
  <input type="password" id="pass" placeholder="รหัสผ่าน">

  <button onclick="login()" id="loginBtn">เข้าสู่ระบบ</button>

  <div class="error" id="errorMsg"></div>
</div>

<script>
const correctUser="admin";
const correctPass="1234";

function login(){

  const user=document.getElementById("user").value;
  const pass=document.getElementById("pass").value;
  const error=document.getElementById("errorMsg");

  if(user===correctUser && pass===correctPass){
    localStorage.setItem("session","active");
    window.location.href="dashboard.html";
  }else{
    error.innerText="รหัสไม่ถูกต้อง";
  }
}

window.onload=function(){
  if(localStorage.getItem("session")){
    window.location.href="dashboard.html";
  }
};
</script>

</body>
</html>
