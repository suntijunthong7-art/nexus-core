<meta charset="UTF-8">

<title>Nexus Core | Secure Access</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#fff;
  width:100%;
  max-width:360px;
  padding:40px 30px;
  border-radius:8px;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
  text-align:center;
}

.logo{
  width:90px;
  margin-bottom:15px;
}

h1{
  font-size:18px;
  margin-bottom:25px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #d1d5db;
  border-radius:6px;
  background:#fff;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#1f2937;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

button:disabled{
  background:#9ca3af;
  cursor:not-allowed;
}

.message{
  margin-top:10px;
  font-size:13px;
  color:red;
}

.footer{
  margin-top:25px;
  font-size:11px;
  color:#6b7280;
}
</style>
</head>
<body>

<div class="container">

  <!-- ถ้า logo หาย ให้เช็คชื่อไฟล์ต้องตรง -->
  <img src="logo.png" class="logo" alt="Logo">

  <h1>Secure Access Portal</h1>

  <input type="text" id="user" placeholder="User ID">
  <input type="password" id="pass" placeholder="Password">

  <button id="loginBtn" onclick="login()">SIGN IN</button>

  <div class="message" id="message"></div>

  <div class="footer">
    © 2025 Nexus Core. All rights reserved.
  </div>

</div>

<script>
const correctUser = "LC-A01";
const correctPass = "Lc1993♧";

let failCount = parseInt(localStorage.getItem("failCount")) || 0;
let lockUntil = parseInt(localStorage.getItem("lockUntil")) || 0;

const btn = document.getElementById("loginBtn");
const msg = document.getElementById("message");

function checkLock(){
  const now = Date.now();
  if(now < lockUntil){
    const remain = Math.ceil((lockUntil - now)/1000);
    btn.disabled = true;
    btn.textContent = "LOCKED ("+remain+"s)";
    setTimeout(checkLock,1000);
  }else{
    btn.disabled = false;
    btn.textContent = "SIGN IN";
    localStorage.removeItem("lockUntil");
  }
}

function login(){
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if(Date.now() < lockUntil){
    return;
  }

  if(user === correctUser && pass === correctPass){
    msg.style.color="green";
    msg.textContent="Login successful";
    failCount = 0;
    localStorage.removeItem("failCount");
  }else{
    failCount++;
    localStorage.setItem("failCount", failCount);
    msg.style.color="red";
    msg.textContent="Invalid credentials";

    if(failCount === 3){
      lock(30);
    }
    else if(failCount === 6){
      lock(90);
    }
    else if(failCount === 9){
      lock(180);
    }
  }
}

function lock(seconds){
  lockUntil = Date.now() + seconds*1000;
  localStorage.setItem("lockUntil", lockUntil);
  checkLock();
}

checkLock();
</script>
