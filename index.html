<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEXUS CORE SYSTEM</title>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{

background:white;
width:340px;
padding:35px;
border-radius:14px;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
text-align:center;
animation:fade 0.8s;

}

.logo{

width:90px;
margin-bottom:15px;

}

h3{
margin:6px 0;
font-weight:600;
letter-spacing:1px;
color:#444;
}

h2{
margin:5px 0 20px 0;
font-weight:700;
color:#1e293b;
}

input{

width:100%;
padding:13px;
margin:8px 0;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;

}

button{

width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;

}

button:disabled{
background:#999;
}

.error{
color:red;
margin-top:12px;
font-size:14px;
}

.footer{
margin-top:18px;
font-size:12px;
color:#777;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>
</head>

<body>

<div class="card">

<img class="logo" src="logo.png">

<h3>NEXUS CORE SYSTEM</h3>
<h2>Secure Access Portal</h2>

<input id="user" placeholder="User ID">

<input id="pass" type="password" placeholder="Password">

<button id="btn" onclick="login()">SIGN IN</button>

<div class="error" id="msg"></div>

<div class="footer">
© 2025 Nexus Core. All rights reserved
</div>

</div>

<script>

const correctCard="LC-A01";
const correctPass="Lc1993♧";

let attempts=0;
let lockUntil=0;

function login(){

let user=document.getElementById("user").value;
let pass=document.getElementById("pass").value;
let msg=document.getElementById("msg");
let btn=document.getElementById("btn");

let now=Date.now();

if(now<lockUntil){

let remain=Math.ceil((lockUntil-now)/1000);
msg.innerText="Account locked. Try again in "+remain+"s";

setTimeout(login,1000);
return;

}

if(user===correctCard && pass===correctPass){

btn.innerText="Verifying...";
btn.disabled=true;

setTimeout(function(){

window.location.href="https://lin.ee/lGGma6p";

},1500);

}

else{

attempts++;

if(attempts==3) lock(30);
if(attempts==6) lock(90);
if(attempts>=9) lock(180);

msg.innerText="Invalid credentials";

}

}

function lock(seconds){

lockUntil=Date.now()+seconds*1000;

let btn=document.getElementById("btn");
btn.disabled=true;

countdown();

}

function countdown(){

let now=Date.now();
let msg=document.getElementById("msg");
let btn=document.getElementById("btn");

if(now>=lockUntil){

btn.disabled=false;
msg.innerText="";
return;

}

let remain=Math.ceil((lockUntil-now)/1000);

msg.innerText="Account locked. Try again in "+remain+"s";

setTimeout(countdown,1000);

}

document.addEventListener("keypress",function(e){

if(e.key==="Enter"){
login();
}

});

document.onkeydown=function(e){

if(e.keyCode==123) return false;

if(e.ctrlKey && e.shiftKey && e.keyCode==73) return false;

}

</script>

</body>
</html>
