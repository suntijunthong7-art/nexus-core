<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบตรวจสอบสิทธิ์การเข้าใช้งาน</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

html,body{
    margin:0;
    height:100%;
    font-family:'Sarabun',sans-serif;
    background:#e4e8eb;
    color:#222;
}

.wrapper{
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* Header */
.header{
    background:#243642;
    color:#fff;
    padding:14px 24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:15px;
}

/* Main */
.main{
    flex:1;
    padding:40px 16px;
}

.panel{
    max-width:520px;
    margin:0 auto;
    background:#fff;
    border:1.5px solid #3a4a56;
    padding:34px 28px;
}

.logo{
    width:70px;
    display:block;
    margin:0 auto 18px auto;
}

h1{
    text-align:center;
    font-size:18px;
    margin:0;
    font-weight:600;
}

.subtitle{
    text-align:center;
    font-size:14px;
    margin:6px 0 22px 0;
    color:#444;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:12px;
    border:1px solid #555;
    font-size:14px;
    background:#fafafa;
}

input:focus{
    outline:none;
    border-color:#000;
}

button{
    width:100%;
    padding:11px;
    background:#243642;
    color:#fff;
    border:none;
    font-size:14px;
    cursor:pointer;
}

button:hover{
    background:#1a2730;
}

.notice{
    margin-top:18px;
    font-size:12px;
    border-top:1px solid #ccc;
    padding-top:12px;
    line-height:1.6;
    color:#333;
}

/* Footer */
.footer{
    text-align:center;
    font-size:12px;
    padding:14px;
    border-top:1px solid #bbb;
    background:#f1f3f5;
}

/* Mobile Adjust */
@media(max-width:600px){
    .panel{
        padding:26px 18px;
    }
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
    <div>ศูนย์ควบคุมสิทธิ์การเข้าถึง</div>
    <div id="datetime"></div>
</div>

<div class="main">
<div class="panel">

<img src="logo.png" class="logo" alt="logo">

<h1>ระบบตรวจสอบสิทธิ์การเข้าใช้งาน</h1>
<div class="subtitle">เฉพาะบุคลากรที่ได้รับอนุญาตเท่านั้น</div>

<input type="text" placeholder="รหัสประจำตัวเจ้าหน้าที่">
<input type="password" placeholder="รหัสผ่าน">

<button>เข้าสู่ระบบ</button>

<div class="notice">
การเข้าถึงโดยไม่ได้รับอนุญาตอาจมีความผิดตามกฎหมายที่เกี่ยวข้อง
</div>

</div>
</div>

<div class="footer">
© หน่วยงานกลางด้านความมั่นคงสารสนเทศ
</div>

</div>

<script>
function updateTime(){
    const now = new Date();
    document.getElementById("datetime").innerText =
        now.toLocaleDateString("th-TH") + " " +
        now.toLocaleTimeString("th-TH");
}

setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
