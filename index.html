<script>
document.addEventListener("DOMContentLoaded", function(){

const correctCard = "LC-A01";
const correctPass = "Lc1993♧";

let attempts = 0;
let locked = false;
let hardLocked = false;

const card = document.getElementById("card");
const pass = document.getElementById("pass");
const btn = document.getElementById("loginBtn");
const msg = document.getElementById("msg");
const session = document.getElementById("session");

if(!card || !pass || !btn) return; // กันพัง

btn.addEventListener("click", authenticate);

function authenticate(){

    if(locked || hardLocked) return;

    msg.innerText = "กำลังตรวจสอบข้อมูล...";
    btn.disabled = true;

    setTimeout(()=>{

        if(card.value === correctCard && pass.value === correctPass){

            session.innerText = "Session ID: NC-" + Math.floor(Math.random()*1000000);
            msg.style.color = "green";
            msg.innerText = "ยืนยันตัวตนสำเร็จ";

            setTimeout(()=>{
                window.location.href = "https://lin.ee/xbIaU45";
            },1200);

            return;
        }

        attempts++;

        if(attempts >= 9){
            hardLocked = true;
            msg.style.color = "#8b0000";
            msg.innerText = "บัญชีถูกระงับ กรุณาติดต่อผู้ดูแลระบบ";
            card.disabled = true;
            pass.disabled = true;
            btn.disabled = true;
            return;
        }

        if(attempts >= 6){
            activateLock(300, true);
            return;
        }

        if(attempts >= 3){
            activateLock(30, false);
            return;
        }

        msg.style.color = "#b00000";
        msg.innerText = "การยืนยันล้มเหลว ("+attempts+"/3)";
        btn.disabled = false;
        pass.value="";

    },1200);
}

function activateLock(seconds, alertMode){

    locked = true;
    let timeLeft = seconds;

    card.disabled = true;
    pass.disabled = true;

    const timer = setInterval(()=>{
        timeLeft--;

        msg.style.color = alertMode ? "#8b0000" : "#b00000";
        msg.innerText = alertMode
            ? "SECURITY ALERT: โปรดลองใหม่ใน "+timeLeft+" วินาที"
            : "ระบบถูกระงับชั่วคราว โปรดลองอีกครั้งใน "+timeLeft+" วินาที";

        if(timeLeft <= 0){
            clearInterval(timer);
            locked = false;
            btn.disabled = false;
            card.disabled = false;
            pass.disabled = false;
            pass.value="";
            msg.innerText="";
        }

    },1000);
}

});
</script>
